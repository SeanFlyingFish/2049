                }
            }
            
            // 根据位置查找tile元素
            function findTileElementAtPosition(row, col) {
                const tiles = tileContainer.querySelectorAll('div');
                for (let tile of tiles) {
                    if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                        return tile;
                    }
                }
                return null;
            }
            
            // 根据位置查找tile元素
            function findTileElementAtPosition(row, col) {
                const tiles = tileContainer.querySelectorAll('div');
                for (let tile of tiles) {
                    if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                        return tile;
                    }
                }
                return null;
            }
            
            // 移除tile元素
            function removeTileElement(row, col) {
                const tile = findTileElementAtPosition(row, col);
                if (tile) {
                    tile.remove();
                }
            }
            
            // 重新渲染所有方块（无动画，用于重置等情况）
            function renderTiles(oldGrid) {
                clearTiles();
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] !== 0) {
                            const isMerged = oldGrid && oldGrid[i] && oldGrid[i][j] !== 0 && oldGrid[i][j] !== grid[i][j];
                            addTile(i, j, grid[i][j], !isMerged);
                            
                            if (isMerged) {
                                const tiles = tileContainer.querySelectorAll('div');
                                const lastTile = tiles[tiles.length - 1];
                                lastTile.classList.add('tile-merge');
                            }
                        }
                    }
                }
            }
            
            // 检查两个数字是否可以合并
            function canMerge(a, b) {
                if (a % 2 === 1 && b % 2 === 1) return true;
                if (a % 2 === 0 && b % 2 === 0 && a === b) return true;
                return false;
            }
            
            // 向左移动（保持X位置不变）
            function moveLeft() {
                let moved = false;
                
                for (let row = 0; row < 4; row++) {
                    // 收集非X位置的值
                    let values = [];
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(row, j) && grid[row][j] !== 0) {
                            values.push(grid[row][j]);
                        }
                    }
                    
                    // 合并
                    for (let i = 0; i < values.length - 1; i++) {
                        if (canMerge(values[i], values[i + 1])) {
                            const val = values[i];
                            values[i] += values[i + 1];
                            score += values[i];
                            mergedValues.push(values[i]);
                            if (isPowerOf2(val) && isPowerOf2(values[i])) {
                                maxMergedPowerOf2 = Math.max(maxMergedPowerOf2, values[i]);
                            }
                            values.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    
                    // 填回grid（只填非X位置）
                    let idx = 0;
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(row, j)) {
                            const oldVal = grid[row][j];
                            grid[row][j] = idx < values.length ? values[idx++] : 0;
                            if (oldVal !== grid[row][j]) moved = true;
                        }
                    }
                }
                
                updateScore();
                return moved;
            }
            
            // 向右移动（保持X位置不变）
            function moveRight() {
                let moved = false;
                
                for (let row = 0; row < 4; row++) {
                    // 收集非X位置的值
                    let values = [];
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(row, j) && grid[row][j] !== 0) {
                            values.push(grid[row][j]);
                        }
                    }
                    
                    // 合并（从右向左）
                    for (let i = values.length - 1; i > 0; i--) {
                        if (canMerge(values[i], values[i - 1])) {
                            const val = values[i];
                            values[i] += values[i - 1];
                            score += values[i];
                            mergedValues.push(values[i]);
                            if (isPowerOf2(val) && isPowerOf2(values[i])) {
                                maxMergedPowerOf2 = Math.max(maxMergedPowerOf2, values[i]);
                            }
                            values.splice(i - 1, 1);
                            i--;
                            moved = true;
                        }
                    }
                    
                    // 填回grid（只填非X位置，从右向左）
                    let idx = values.length - 1;
                    for (let j = 3; j >= 0; j--) {
                        if (!isBlocked(row, j)) {
                            const oldVal = grid[row][j];
                            grid[row][j] = idx >= 0 ? values[idx--] : 0;
                            if (oldVal !== grid[row][j]) moved = true;
                        }
                    }
                }
                
                updateScore();
                return moved;
            }
            
            // 向上移动（保持X位置不变）
            function moveUp() {
                let moved = false;
                
                for (let col = 0; col < 4; col++) {
                    // 收集非X位置的值
                    let values = [];
                    for (let i = 0; i < 4; i++) {
                        if (!isBlocked(i, col) && grid[i][col] !== 0) {
                            values.push(grid[i][col]);
                        }
                    }
                    
                    // 合并
                    for (let i = 0; i < values.length - 1; i++) {
                        if (canMerge(values[i], values[i + 1])) {
                            const val = values[i];
                            values[i] += values[i + 1];
                            score += values[i];
                            mergedValues.push(values[i]);
                            if (isPowerOf2(val) && isPowerOf2(values[i])) {
                                maxMergedPowerOf2 = Math.max(maxMergedPowerOf2, values[i]);
                            }
                            values.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    
                    // 填回grid（只填非X位置）
                    let idx = 0;
                    for (let i = 0; i < 4; i++) {
                        if (!isBlocked(i, col)) {
                            const oldVal = grid[i][col];
                            grid[i][col] = idx < values.length ? values[idx++] : 0;
                            if (oldVal !== grid[i][col]) moved = true;
                        }
                    }
                }
                
                updateScore();
                return moved;
            }
            
            // 向下移动（保持X位置不变）
            function moveDown() {
                let moved = false;
                
                for (let col = 0; col < 4; col++) {
                    // 收集非X位置的值
                    let values = [];
                    for (let i = 0; i < 4; i++) {
                        if (!isBlocked(i, col) && grid[i][col] !== 0) {
                            values.push(grid[i][col]);
                        }
                    }
                    
                    // 合并（从下向上）
                    for (let i = values.length - 1; i > 0; i--) {
                        if (canMerge(values[i], values[i - 1])) {
                            const val = values[i];
                            values[i] += values[i - 1];
                            score += values[i];
                            mergedValues.push(values[i]);
                            if (isPowerOf2(val) && isPowerOf2(values[i])) {
                                maxMergedPowerOf2 = Math.max(maxMergedPowerOf2, values[i]);
                            }
                            values.splice(i - 1, 1);
                            i--;
                            moved = true;
                        }
                    }
                    
                    // 填回grid（只填非X位置，从下向上）
                    let idx = values.length - 1;
                    for (let i = 3; i >= 0; i--) {
                        if (!isBlocked(i, col)) {
                            const oldVal = grid[i][col];
                            grid[i][col] = idx >= 0 ? values[idx--] : 0;
                            if (oldVal !== grid[i][col]) moved = true;
                        }
                    }
                }
                
                updateScore();
                return moved;
            }
            
            // 检查游戏是否结束（考虑X位置）
            function isGameOver() {
                // 检查是否有空格（跳过X位置）
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0 && !isBlocked(i, j)) return false;
                    }
                }
                
                // 检查是否有可合并的相邻方块（跳过X位置）
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (isBlocked(i, j) || grid[i][j] === -1) continue;
                        if (j < 3 && !isBlocked(i, j + 1) && canMerge(grid[i][j], grid[i][j + 1])) return false;
                        if (i < 3 && !isBlocked(i + 1, j) && canMerge(grid[i][j], grid[i + 1][j])) return false;
                    }
                }
                
                if (hasAnyItems()) {
                    showToast('棋盘满了！快使用道具继续游戏！');
                    return false;
                }
                
                return true;
            }
            
            // 显示覆盖层
            function showOverlay(title) {
                overlayTitle.textContent = title;
                gameOverlay.classList.remove('hidden');
                clearGameState();
            }
            
            // 道具系统 - 选择道具
            function selectItem(type) {
                if (items[type] <= 0) return;

                // 撤回道具直接执行
                if (type === 'undo') {
                    doUndo();
                    return;
                }
                
                if (activeItem === type) {
                    activeItem = null;
                    selectedTile = null;
                    document.getElementById('item-hint').textContent = itemHints.default;
                } else {
                    activeItem = type;
                    selectedTile = null;
                    document.getElementById('item-hint').textContent = itemHints[type];
                    
                    if (type === 'shuffle') {
                        useShuffleItem();
                        return;
                    }
                }
                
                updateItemDisplay();
                renderTiles(grid);
                
                const tiles = tileContainer.querySelectorAll('div');
                tiles.forEach(tile => {
                    if (activeItem) {
                        tile.classList.add('tile-highlight');
                    } else {
                        tile.classList.remove('tile-highlight');
                        tile.classList.remove('tile-selected');
                    }
                });
            }
            
            // 使用深度优先搜索(DFS)查找所有连通的同色方块（跳过X位置）
            function findConnectedSameColorTiles(startRow, startCol) {
                if (isBlocked(startRow, startCol) || grid[startRow][startCol] === -1) return [];
                const targetColorClass = getTileColorClass(grid[startRow][startCol]);
                const visited = Array(4).fill().map(() => Array(4).fill(false));
                const connected = [];
                
                function dfs(row, col) {
                    if (row < 0 || row >= 4 || col < 0 || col >= 4) return;
                    if (visited[row][col]) return;
                    if (isBlocked(row, col) || grid[row][col] === -1) return;
                    if (grid[row][col] === 0) return;
                    if (getTileColorClass(grid[row][col]) !== targetColorClass) return;
                    
                    visited[row][col] = true;
                    connected.push({ row, col, value: grid[row][col] });
                    
                    dfs(row - 1, col);
                    dfs(row + 1, col);
                    dfs(row, col - 1);
                    dfs(row, col + 1);
                }
                
                dfs(startRow, startCol);
                return connected;
            }
            
            // 道具系统 - 在方块上使用道具
            function useItemOnTile(row, col) {
                if (!activeItem || items[activeItem] <= 0) return;
                
                const value = grid[row][col];
                if (value === 0) return;
                
                let success = false;
                const oldGrid = JSON.parse(JSON.stringify(grid));
                
                switch (activeItem) {
                    case 'swap':
                        // 交换道具：可交换棋盘上任意两个方块
                        if (!selectedTile) {
                            selectedTile = { row, col };
                            showToast('已选择第一个方块，请选择第二个方块（任意位置）');
                            
                            renderTiles(grid);
                            const tiles = tileContainer.querySelectorAll('div');
                            tiles.forEach(tile => {
                                if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                                    tile.classList.add('tile-selected');
                                }
                                tile.classList.add('tile-highlight');
                            });
                            return;
                        } else {
                            if (selectedTile.row === row && selectedTile.col === col) {
                                // 点同一个方块 → 取消选择
                                selectedTile = null;
                                showToast('已取消选择');
                                renderTiles(grid);
                                const tiles = tileContainer.querySelectorAll('div');
                                tiles.forEach(tile => tile.classList.add('tile-highlight'));
                                return;
                            }
                            
                            // 任意两个方块都可以交换
                            [grid[selectedTile.row][selectedTile.col], grid[row][col]] = 
                            [grid[row][col], grid[selectedTile.row][selectedTile.col]];
                            
                            success = true;
                            showToast('交换成功！');
                        }
                        break;
                        
                    case 'clear':
                        const connectedTiles = findConnectedSameColorTiles(row, col);
                        
                        if (connectedTiles.length >= 3) {
                            let sum = 0;
                            for (const tile of connectedTiles) sum += tile.value;
                            const average = Math.round(sum / connectedTiles.length);
                            
                            for (const tile of connectedTiles) grid[tile.row][tile.col] = 0;
                            grid[row][col] = average;
                            
                            success = true;
                            showToast(`消除了${connectedTiles.length}个同色方块，生成了${average}！`);
                        } else {
                            showToast(`需要至少3个相连的同色方块！当前只有${connectedTiles.length}个`);
                            return;
                        }
                        break;
                        
                    case 'scissors':
                        if (value > 2) {
                            grid[row][col] = Math.floor(value / 2);
                            success = true;
                            showToast(`将${value}减半为${grid[row][col]}！`);
                        } else {
                            showToast('不能对2使用剪刀！');
                            return;
                        }
                        break;
                        
                    case 'plus':
                        grid[row][col] = value + 1;
                        success = true;
                        showToast(`将${value}变成了${value + 1}！`);
                        break;
                }
                
                if (success) {
                    playItemSound(activeItem);
                    items[activeItem]--;
                    activeItem = null;
                    selectedTile = null;
                    document.getElementById('item-hint').textContent = itemHints.default;
                    
                    updateItemDisplay();
                    renderTilesWithAnimation(oldGrid);
                    updateMaxTileValue();
                    pushHistory();
                    saveGameState();
                    
                    if (!checkWin() && isGameOver()) {
                        gameOver = true;
                        showOverlay('游戏结束！');
                    }
                }
            }
            
            // 使用洗牌道具（保持X位置不变）
            function useShuffleItem() {
                const oldGrid = JSON.parse(JSON.stringify(grid));
                const values = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(i, j) && grid[i][j] !== 0) values.push(grid[i][j]);
                    }
                }
                
                for (let i = values.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [values[i], values[j]] = [values[j], values[i]];
                }
                
                // 重新填回grid，保持X位置不变
                let index = 0;
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (isBlocked(i, j)) {
                            grid[i][j] = -1;
                        } else if (index < values.length) {
                            grid[i][j] = values[index++];
                        } else {
                            grid[i][j] = 0;
                        }
                    }
                }
                
                items.shuffle--;
                activeItem = null;
                selectedTile = null;
                document.getElementById('item-hint').textContent = itemHints.default;
                
                updateItemDisplay();
                renderTilesWithAnimation(oldGrid);
                updateMaxTileValue();
                pushHistory();
                saveGameState();
                
                showToast('所有方块已打乱！');
                
                if (!checkWin() && isGameOver()) {
                    gameOver = true;
                    showOverlay('游戏结束！');
                }
            }
            
            // 键盘事件监听
            document.addEventListener('keydown', (e) => {
                initAudio();
                if (activeItem && e.key === 'Escape') {
                    activeItem = null;
                    selectedTile = null;
                    document.getElementById('item-hint').textContent = itemHints.default;
                    updateItemDisplay();
                    
                    const tiles = tileContainer.querySelectorAll('div');
                    tiles.forEach(tile => {
                        tile.classList.remove('tile-highlight');
                        tile.classList.remove('tile-selected');
                    });
                    return;
                }
                
                switch (e.key) {
                    case 'ArrowUp':    e.preventDefault(); move('up');    break;
                    case 'ArrowDown':  e.preventDefault(); move('down');  break;
                    case 'ArrowLeft':  e.preventDefault(); move('left');  break;
                    case 'ArrowRight': e.preventDefault(); move('right'); break;
                }
            });
            
            // 触摸滑动事件（只在棋盘区域内响应，并阻止页面滚动）
            let touchStartX = 0;
            let touchStartY = 0;
            let touchMoved = false; // 是否发生了真实的滑动

            const gameBoard = document.getElementById('game-board');

            gameBoard.addEventListener('touchstart', (e) => {
                initAudio();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchMoved = false;
                // 不在 touchstart 里 preventDefault，让 click 事件可以正常触发
            }, { passive: true });

            gameBoard.addEventListener('touchmove', (e) => {
                const dx = Math.abs(e.touches[0].clientX - touchStartX);
                const dy = Math.abs(e.touches[0].clientY - touchStartY);
                // 超过 8px 才认为是滑动，阻止页面滚动
                if (dx > 8 || dy > 8) {
                    touchMoved = true;
                    e.preventDefault();
                }
            }, { passive: false });

            gameBoard.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;

                if (touchMoved) {
                    // 真实滑动：执行游戏移动，阻止默认行为（防止 click 误触）
                    handleSwipe(diffX, diffY);
                    e.preventDefault();
                }
                // 轻触（tap）：不 preventDefault，让 click 事件冒泡到方块元素
                touchMoved = false;
            }, { passive: false });

            function handleSwipe(diffX, diffY) {
                const minSwipeDistance = 30;
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (Math.abs(diffX) > minSwipeDistance) {
                        move(diffX > 0 ? 'right' : 'left');
                    }
                } else {
                    if (Math.abs(diffY) > minSwipeDistance) {
                        move(diffY > 0 ? 'down' : 'up');
                    }
                }
            }
            
            // 道具按钮点击事件
            for (const [type, button] of Object.entries(itemButtons)) {
                button.addEventListener('click', () => selectItem(type));
            }
            
            // 新游戏按钮点击事件
            newGameButton.addEventListener('click', () => {
                clearGameState();
                initGame();
            });
            overlayButton.addEventListener('click', () => {
                clearGameState();
                initGame();
            });
            
            // 启动时：尝试恢复存档，否则新游戏
            const restored = loadGameState();
            if (restored) {
                activeItem = null;
                selectedTile = null;
                mergedValues = [];
                updateScore();
                updateItemDisplay();
                updateChallengeDisplay();
                updateLevelDisplay();
                updateHelpUI();
                clearTiles();
                gameOverlay.classList.add('hidden');
                renderTiles(grid);
                showToast('✅ 已恢复上次游戏进度！');
            } else {
                initGame();
            }
        });

            <div class="help-option" data-type="merge">

                <p>点击1个方块，该方块变为九宫格平均数，周围8格清空</p>
            </div>
            
            <div class="help-option" data-type="destroy">
                <h4>💥 爆炸 <span class="help-option-count">（剩余1次）</span></h4>
                <p>点击方块，直接摧毁这些方块（变为空）</p>
            </div>
            
            <div class="help-option" data-type="rearrange">
                <h4>📐 整队 <span class="help-option-count">（剩余1次）</span></h4>
                <p>将所有方块按数字从小到大，以S形顺序排列</p>
            </div>
            
            <button id="help-cancel" class="help-cancel">取消</button>
        </div>
    </div>
</body>
</html>
