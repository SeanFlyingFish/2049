<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2049</title>
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-2049': '#faf8ef',
                        'board-2049': '#bbada0',
                        'cell-2049': '#cdc1b4',
                        'text-light': '#f9f6f2',
                        'text-dark': '#776e65',
                        'item-swap': '#8f7a66',
                        'item-clear': '#e74c3c',
                        'item-scissors': '#f39c12',
                        'item-shuffle': '#3498db',
                        'item-plus': '#2ecc71',
                        'item-undo': '#9b59b6',
                        'challenge': '#9b59b6',
                    },
                    fontFamily: {
                        'game': ['Clear Sans', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .tile-gray { background-color: #ffffff; color: #776e65; }
            .tile-2 { background-color: #eee4da; color: #776e65; }
            .tile-4 { background-color: #ede0c8; color: #776e65; }
            .tile-8 { background-color: #f2b179; color: #f9f6f2; }
            .tile-16 { background-color: #f59563; color: #f9f6f2; }
            .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
            .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
            .tile-128 { background-color: #edcf72; color: #f9f6f2; }
            .tile-256 { background-color: #cbd529; color: #f9f6f2; }
            .tile-512 { background-color: #79cd44; color: #f9f6f2; }
            .tile-1024 { background-color: #30ace4; color: #f9f6f2; }
            .tile-2048 { background-color: #d02c3f; color: #f9f6f2; }
            .tile-2049 { background-color: #e74c3c; color: #f9f6f2; }
            .tile-super { background-color: #3c3a32; color: #f9f6f2; }
            
            .tile-appear {
                animation: appear 0.2s ease-in-out;
            }
            
            .tile-merge {
                animation: merge 0.2s ease-in-out;
            }
            
            .tile-highlight {
                animation: highlight 0.5s ease-in-out infinite alternate;
            }
            
            .tile-selected {
                animation: selected 0.3s ease-in-out;
                box-shadow: 0 0 15px 5px rgba(0, 255, 0, 0.8);
            }
            
            .tile-challenge {
                animation: challenge-appear 0.5s ease-in-out;
                box-shadow: 0 0 10px 3px rgba(155, 89, 182, 0.7);
            }
            
            @keyframes appear {
                0% { transform: scale(0); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }
            
            @keyframes merge {
                0% { transform: scale(1); }
                50% { transform: scale(1.2); }
                100% { transform: scale(1); }
            }
            
            @keyframes highlight {
                0% { box-shadow: 0 0 5px 2px rgba(255, 255, 255, 0.5); }
                100% { box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.8); }
            }
            
            @keyframes selected {
                0% { transform: scale(1); }
                50% { transform: scale(1.1); }
                100% { transform: scale(1); }
            }
            
            @keyframes challenge-appear {
                0% { transform: scale(0) rotate(0deg); opacity: 0; }
                50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
                100% { transform: scale(1) rotate(360deg); opacity: 1; }
            }
            
            .help-overlay.hidden {
                display: none;
            }
            
            /* 悬浮帮助按钮 */
            .help-button {
                position: fixed;
                bottom: 30px;
                right: 30px;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: linear-gradient(135deg, #9b59b6, #8e44ad);
                color: white;
                border: none;
                box-shadow: 0 4px 12px rgba(155, 89, 182, 0.4);
                cursor: pointer;
                font-size: 12px;
                font-weight: bold;
                z-index: 1000;
                transition: all 0.3s ease;
            }
            
            .help-button:hover:not(:disabled) {
                transform: scale(1.1);
                box-shadow: 0 6px 20px rgba(155, 89, 182, 0.6);
            }
            
            .help-button:disabled {
                background: #bdc3c7;
                cursor: not-allowed;
                box-shadow: none;
            }
            
            /* 帮助效果选择弹窗 */
            .help-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.7);
                z-index: 9998;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .help-modal {
                background: #faf8ef;
                border-radius: 12px;
                padding: 24px;
                max-width: 400px;
                width: 90%;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            }
            
            .help-modal h3 {
                text-align: center;
                font-size: 20px;
                font-weight: bold;
                margin-bottom: 16px;
                color: #776e65;
            }
            
            .help-option {
                background: white;
                border: 2px solid #cdc1b4;
                border-radius: 8px;
                padding: 16px;
                margin-bottom: 12px;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            
            .help-option:hover {
                border-color: #9b59b6;
                background: #f5f0ff;
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(155, 89, 182, 0.2);
            }
            
            .help-option h4 {
                font-size: 16px;
                font-weight: bold;
                color: #9b59b6;
                margin-bottom: 8px;
            }
            
            .help-option p {
                font-size: 14px;
                color: #776e65;
                line-height: 1.4;
            }
            
            .help-cancel {
                width: 100%;
                padding: 10px;
                background: #bdc3c7;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                margin-top: 8px;
            }
            
            .help-cancel:hover {
                background: #95a5a6;
            }

            .help-option-disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .help-option-disabled:hover {
                border-color: #cdc1b4;
                background: white;
                transform: none;
                box-shadow: none;
            }
            
            @keyframes tile-destroy {
                0% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.2); opacity: 0.5; }
                100% { transform: scale(0); opacity: 0; }
            }
            
            .tile-destroying {
                animation: tile-destroy 0.3s ease-out forwards;
            }
            
            @keyframes tile-merge {
                0% { transform: scale(1); }
                50% { transform: scale(1.3); }
                100% { transform: scale(1); }
            }
            
            .tile-merging {
                animation: tile-merge 0.3s ease-out;
            }
            
            .game-overlay {
                background-color: rgba(238, 228, 218, 0.73);
                z-index: 9999;
            }
            
            .item-button {
                transition: all 0.2s ease;
            }
            
            .item-button:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }
            
            .item-button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            
            .item-active {
                transform: scale(1.1);
                box-shadow: 0 0 10px 3px rgba(255, 255, 255, 0.7);
            }
            
            .challenge-indicator {
                background: linear-gradient(90deg, #9b59b6, #8e44ad);
            }
        }
    </style>
</head>
<body class="bg-bg-2049 min-h-screen flex flex-col items-center justify-center p-4 font-game text-text-dark">
        <div class="w-full max-w-md">
            <!-- 游戏标题和分数 -->
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <img src="icon.png" alt="2049" class="w-16 h-16">
                    <h1 class="text-[30px] font-bold leading-none">2049</h1>
                </div>
            <div class="flex gap-2">
                <div class="bg-board-2049 rounded-md px-4 py-2 text-center">
                    <div class="text-xs uppercase text-white/70 font-bold">分数</div>
                    <div id="score" class="text-2xl font-bold text-white">0</div>
                </div>
                <div class="bg-board-2049 rounded-md px-4 py-2 text-center">
                    <div class="text-xs uppercase text-white/70 font-bold">最高分</div>
                    <div id="best-score" class="text-2xl font-bold text-white">0</div>
                </div>
            </div>
        </div>
        
        <!-- 挑战进度条 -->
        <div class="mb-4">
            <div class="flex justify-between text-xs mb-1">
                <span class="font-bold text-challenge">随机挑战生成进度</span>
                <span id="challenge-count">0 / 30</span>
            </div>
            <div class="w-full bg-board-2049/30 rounded-full h-2">
                <div id="challenge-progress" class="challenge-indicator h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- 游戏说明和新游戏按钮 -->
        <div class="flex justify-between items-center mb-4">
            <p class="text-sm font-bold text-challenge" id="level-info">第1关：目标 129</p>
            <button id="new-game" class="bg-board-2049 hover:bg-board-2049/90 text-white font-bold py-2 px-4 rounded transition-colors">
                新游戏
            </button>
        </div>
        
        <!-- 道具栏 -->
        <div class="bg-board-2049/20 rounded-md p-3 mb-4">
            <div class="text-xs font-bold mb-2 text-center" id="item-hint">道具栏 (点击选择，再点击方块使用)</div>
            <div class="grid grid-cols-6 gap-2">
                <button id="item-swap" class="item-button bg-item-swap text-white rounded-md py-2 px-1 flex flex-col items-center" title="交换棋盘上任意两个方块的位置">
                    <i class="fa fa-exchange text-lg"></i>
                    <span class="text-xs mt-1">交换 <span id="count-swap">0</span></span>
                </button>
                <button id="item-clear" class="item-button bg-item-clear text-white rounded-md py-2 px-1 flex flex-col items-center" title="消除所有相连的同色方块，生成平均值方块">
                    <i class="fa fa-eraser text-lg"></i>
                    <span class="text-xs mt-1">消除 <span id="count-clear">0</span></span>
                </button>
                <button id="item-scissors" class="item-button bg-item-scissors text-white rounded-md py-2 px-1 flex flex-col items-center" title="将一个方块数字减半">
                    <i class="fa fa-cut text-lg"></i>
                    <span class="text-xs mt-1">剪刀 <span id="count-scissors">0</span></span>
                </button>
                <button id="item-shuffle" class="item-button bg-item-shuffle text-white rounded-md py-2 px-1 flex flex-col items-center" title="随机打乱所有方块">
                    <i class="fa fa-random text-lg"></i>
                    <span class="text-xs mt-1">洗牌 <span id="count-shuffle">0</span></span>
                </button>
                <button id="item-plus" class="item-button bg-item-plus text-white rounded-md py-2 px-1 flex flex-col items-center" title="将一个方块加1">
                    <i class="fa fa-plus text-lg"></i>
                    <span class="text-xs mt-1">加一 <span id="count-plus">0</span></span>
                </button>
                <button id="item-undo" class="item-button bg-item-undo text-white rounded-md py-2 px-1 flex flex-col items-center" title="撤回上一步操作">
                    <i class="fa fa-undo text-lg"></i>
                    <span class="text-xs mt-1">撤回 <span id="count-undo">0</span></span>
                </button>
            </div>
        </div>
        
        <!-- 游戏棋盘 -->
        <div id="game-board" class="relative bg-board-2049 rounded-md p-3 aspect-square">
            <!-- 背景格子 -->
            <div class="grid grid-cols-4 gap-3 h-full">
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
            </div>
            
            <!-- 数字方块容器 -->
            <div id="tile-container" class="absolute top-3 left-3 right-3 bottom-3">
                <!-- 方块会动态生成在这里 -->
            </div>
            
            <!-- 游戏结束/胜利覆盖层 -->
            <div id="game-overlay" class="absolute inset-0 rounded-md game-overlay flex flex-col items-center justify-center hidden">
                <h2 id="overlay-title" class="text-4xl font-bold mb-4"></h2>
                <button id="overlay-button" class="bg-board-2049 hover:bg-board-2049/90 text-white font-bold py-2 px-4 rounded transition-colors">
                    再来一局
                </button>
            </div>
        </div>
        
        <!-- 操作提示 -->
        <div class="mt-6 text-center text-sm">
            <p>使用 <strong>方向键</strong> 或 <strong>滑动屏幕</strong> 移动方块</p>
            <p class="mt-1 text-challenge font-bold">任意奇数均可合并，仅相同偶数可合并！</p>
            <p class="mt-1 text-green-600 font-bold">每次合成32及以上数字可获得1个道具！</p>
            <p class="mt-1 text-blue-600 font-bold">每移动一定次数会生成1个随机挑战数字！</p>
            <p class="mt-1">只要有道具，棋盘满了也不会输！</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tileContainer = document.getElementById('tile-container');
            const scoreDisplay = document.getElementById('score');
            const bestScoreDisplay = document.getElementById('best-score');
            const newGameButton = document.getElementById('new-game');
            const gameOverlay = document.getElementById('game-overlay');
            const overlayTitle = document.getElementById('overlay-title');
            const overlayButton = document.getElementById('overlay-button');
            const challengeCount = document.getElementById('challenge-count');
            const challengeProgress = document.getElementById('challenge-progress');
            
            // 道具相关元素
            const itemButtons = {
                swap: document.getElementById('item-swap'),
                clear: document.getElementById('item-clear'),
                scissors: document.getElementById('item-scissors'),
                shuffle: document.getElementById('item-shuffle'),
                plus: document.getElementById('item-plus'),
                undo: document.getElementById('item-undo')
            };
            
            const itemCounts = {
                swap: document.getElementById('count-swap'),
                clear: document.getElementById('count-clear'),
                scissors: document.getElementById('count-scissors'),
                shuffle: document.getElementById('count-shuffle'),
                plus: document.getElementById('count-plus'),
                undo: document.getElementById('count-undo')
            };
            
            let grid = [];
            let score = 0;
            let bestScore = parseInt(localStorage.getItem('2049-best-score') || '0');
            let gameOver = false;
            let gameWon = false;
            let currentLevel = 1;
            const levelTargets = { 1: 129, 2: 2049 };
            
            // 道具系统
            let items = {
                swap: 0,
                clear: 0,
                scissors: 0,
                shuffle: 0,
                plus: 0,
                undo: 0
            };
            
            let activeItem = null;
            let selectedTile = null;
            let nextTileId = 0;
            let tilePositions = {}; // 用于交换道具的第一个选中方块
            let history = []; // 用于撤回的历史记录
            
            // 道具使用提示
            const itemHints = {
                swap: '交换：选择2个方块交换位置',
                clear: '清除：点击至少3个相连的同色方块中的1块，合成为平均数',
                scissors: '剪刀：选择目标方块，使其数字减半',
                plus: '加一：选择目标方块，使其数字+1',
                default: '道具栏 (点击选择，再点击方块使用)'
            };
            
            // ============================
            // 关卡特殊规则（第一关：第4列/第4行为X不可操作）
            // ============================
            function isBlocked(row, col) {
                // 当前所有关卡均无X不可操作位置，统一返回false
                return false;
            }

            // 第一关预设布局（4×4）
            const level1Preset = [
                [0, 0, 0, 0],
                [0, 0, 0, 0],
                [7, 0, 9, 0],
                [0, 8, 8, 0]
            ];

            // ============================
            // 帮助系统（我来助你）
            // ============================
            let helpCounts = { merge: 1, destroy: 1, rearrange: 1 }; // 每局各1次
            let helpActive = false;
            let helpMode = null; // 'merge', 'destroy', 'rearrange'
            let helpSelectedTiles = [];

            const helpButton = document.getElementById('help-button');
            const helpOverlay = document.getElementById('help-overlay');
            const helpOptions = document.querySelectorAll('.help-option');
            const helpCancel = document.getElementById('help-cancel');

            // 更新帮助按钮和帮助选项显示
            function updateHelpUI() {
                const totalLeft = helpCounts.merge + helpCounts.destroy + helpCounts.rearrange;
                if (totalLeft <= 0) {
                    helpButton.disabled = true;
                    helpButton.title = '本局已用完帮助';
                } else {
                    helpButton.disabled = false;
                    helpButton.title = '我来助你（剩余' + totalLeft + '次）';
                }

                // 更新每个选项的可用状态
                helpOptions.forEach(opt => {
                    const type = opt.dataset.type;
                    if (helpCounts[type] <= 0) {
                        opt.classList.add('help-option-disabled');
                        opt.style.pointerEvents = 'none';
                    } else {
                        opt.classList.remove('help-option-disabled');
                        opt.style.pointerEvents = '';
                    }

                    // 更新显示剩余次数
                    const countSpan = opt.querySelector('.help-option-count');
                    if (countSpan) {
                        countSpan.textContent = '（剩余' + helpCounts[type] + '次）';
                    }
                });
            }

            // 显示帮助效果选择弹窗
            function showHelpModal() {
                if (gameOver || gameWon) {
                    showToast('游戏已结束！');
                    return;
                }
                const totalLeft = helpCounts.merge + helpCounts.destroy + helpCounts.rearrange;
                if (totalLeft <= 0) {
                    showToast('本局帮助已用完！');
                    return;
                }
                updateHelpUI();
                helpOverlay.classList.remove('hidden');
            }

            // 隐藏帮助效果选择弹窗
            function hideHelpModal() {
                helpOverlay.classList.add('hidden');
            }
            
            // 开始帮助效果
            function startHelpMode(mode) {
                if (!helpCounts[mode] || helpCounts[mode] <= 0) {
                    showToast('该效果本局已使用！');
                    return;
                }

                helpActive = true;
                helpMode = mode;
                helpSelectedTiles = [];
                helpCounts[mode]--;   // 消耗1次
                hideHelpModal();

                if (mode === 'merge') {
                    showToast('融合：请点击1个方块');
                } else if (mode === 'destroy') {
                    const totalTiles = countNonZeroTiles();
                    const needCount = Math.min(3, totalTiles);
                    showToast(`爆炸：请点击${needCount}个方块（共${totalTiles}块）`);
                } else if (mode === 'rearrange') {
                    executeRearrange();
                }

                if (mode !== 'rearrange') {
                    const tiles = tileContainer.querySelectorAll('div');
                    tiles.forEach(tile => {
                        tile.classList.add('tile-highlight');
                    });
                }

                updateHelpUI();
            }

            // 统计棋盘上非零方块数量（跳过X位置）
            function countNonZeroTiles() {
                let count = 0;
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(i, j) && grid[i][j] > 0) count++;
                    }
                }
                return count;
            }

            // 获取爆炸需要选择的方块数（不足3块时选全部）
            function getDestroyTargetCount() {
                const total = countNonZeroTiles();
                return Math.min(3, total);
            }
            
            // 执行融合效果
            function executeMerge(row, col) {
                const tileValue = grid[row][col];
                if (tileValue === 0) {
                    showToast('请选择一个有数字的方块！');
                    return;
                }
                
                // 收集九宫格内的所有数字
                const values = [];
                for (let i = Math.max(0, row - 1); i <= Math.min(3, row + 1); i++) {
                    for (let j = Math.max(0, col - 1); j <= Math.min(3, col + 1); j++) {
                        if (grid[i][j] > 0) {
                            values.push(grid[i][j]);
                        }
                    }
                }
                
                if (values.length === 0) return;
                
                // 计算平均数
                const avg = Math.floor(values.reduce((a, b) => a + b, 0) / values.length);
                
                // 将点击位置设为平均数，周围8格清空（X位置保持X）
                for (let i = Math.max(0, row - 1); i <= Math.min(3, row + 1); i++) {
                    for (let j = Math.max(0, col - 1); j <= Math.min(3, col + 1); j++) {
                        if (i === row && j === col) {
                            // 点击位置：设为平均数
                            grid[i][j] = avg;
                        } else if (!isBlocked(i, j)) {
                            // 非X位置：清空
                            grid[i][j] = 0;
                        }
                        // X位置：保持 grid[i][j] = -1 不变
                    }
                }
                
                // 更新显示
                helpActive = false;
                helpMode = null;
                updateHelpUI();
                pushHistory();
                renderTiles(grid);
                updateMaxTileValue();
                saveGameState();
                
                showToast(`融合完成！方块已变为${avg}`);
                playItemSound('swap');
                
                // 检查胜利
                checkWin();
            }
            
            // 执行爆炸效果
            function executeDestroy(row, col) {
                // 防抖：如果帮助模式已结束（已被处理过），忽略重复调用
                if (!helpActive) return;

                // 检查是否已选中（重复点击则取消选择）
                const existIdx = helpSelectedTiles.findIndex(p => p.row === row && p.col === col);
                const tiles = tileContainer.querySelectorAll('div');

                if (existIdx !== -1) {
                    // 取消选择：移除高光，从列表中删除
                    helpSelectedTiles.splice(existIdx, 1);
                    tiles.forEach(tile => {
                        if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                            tile.classList.remove('tile-selected');
                            tile.classList.add('tile-highlight');
                        }
                    });
                    const target = getDestroyTargetCount();
                    showToast(`已取消选择，已选${helpSelectedTiles.length}/${target}`);
                    return;
                }

                // 新选择：添加高光
                helpSelectedTiles.push({ row, col });
                tiles.forEach(tile => {
                    if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                        tile.classList.add('tile-selected');
                        tile.classList.remove('tile-highlight');
                    }
                });

                const target = getDestroyTargetCount();

                if (helpSelectedTiles.length < target) {
                    showToast(`已选择${helpSelectedTiles.length}/${target}，继续点击`);
                    return;
                }

                // 选够数量，执行摧毁
                const destroyedCount = helpSelectedTiles.length;
                const totalBefore = countNonZeroTiles();
                helpSelectedTiles.forEach(pos => {
                    grid[pos.row][pos.col] = 0;
                });

                // 更新显示
                helpActive = false;
                helpMode = null;
                helpSelectedTiles = [];
                updateHelpUI();
                pushHistory();
                renderTiles(grid);

                // 如果清空了所有方块，自动生成1个新方块
                if (totalBefore === destroyedCount) {
                    addRandomTile();
                }

                updateMaxTileValue();
                saveGameState();

                showToast(`爆炸完成！已摧毁${destroyedCount}个方块`);
                playItemSound('clear');
                checkWin();
            }
            
            // 执行整队效果
            function executeRearrange() {
                // 收集所有非零数字
                const values = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] > 0) {
                            values.push(grid[i][j]);
                        }
                    }
                }
                
                // 从小到大排序
                values.sort((a, b) => a - b);
                
                // S形排列：第0行左→右，第1行右→左，第2行左→右，第3行右→左
                const newGrid = Array(4).fill().map(() => Array(4).fill(0));
                let index = 0;
                for (let i = 0; i < 4; i++) {
                    if (i % 2 === 0) {
                        // 偶数行：左→右
                        for (let j = 0; j < 4; j++) {
                            if (index < values.length) {
                                newGrid[i][j] = values[index++];
                            }
                        }
                    } else {
                        // 奇数行：右→左
                        for (let j = 3; j >= 0; j--) {
                            if (index < values.length) {
                                newGrid[i][j] = values[index++];
                            }
                        }
                    }
                }
                
                // 更新grid
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        grid[i][j] = newGrid[i][j];
                    }
                }
                
                // 更新显示
                helpActive = false;
                helpMode = null;
                updateHelpUI();
                pushHistory();
                renderTiles(grid);
                updateMaxTileValue();
                saveGameState();
                
                showToast('整队完成！方块已按S形排列');
                playItemSound('shuffle');
                
                // 检查胜利
                checkWin();
            }
            
            // 帮助效果选择
            helpOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const type = option.getAttribute('data-type');
                    startHelpMode(type);
                });
            });
            
            // 帮助按钮点击
            helpButton.addEventListener('click', () => {
                showHelpModal();
            });
            
            // 取消按钮
            helpCancel.addEventListener('click', () => {
                hideHelpModal();
            });
            
            // ESC取消帮助
            document.addEventListener('keydown', (e) => {
                if (helpActive && e.key === 'Escape') {
                    helpActive = false;
                    helpMode = null;
                    helpSelectedTiles = [];
                    hideHelpModal();
                    showToast('已取消帮助效果');

                    // 移除所有高光
                    const tiles = tileContainer.querySelectorAll('div');
                    tiles.forEach(tile => {
                        tile.classList.remove('tile-highlight');
                        tile.classList.remove('tile-selected');
                    });
                }
            });
            
            // 挑战系统
            let moveCount = 0;
            let refreshInterval = 30;
            let maxTileValue = 0;
            
            // 本次移动中合成的次数和数值
            let mergedValues = [];
            
            // 挑战刷新随机数范围上限（仅2个相同2的n次幂合成时更新）
            let maxMergedPowerOf2 = 4;
            
            // ============================
            // 音效系统（Web Audio API）
            // ============================
            var audioCtx = null;
            var audioInited = false;

            function initAudio() {
                if (audioInited) return;
                try {
                    var AC = window['AudioContext'] || window['webkitAudioContext'];
                    audioCtx = new AC();
                    audioInited = true;
                } catch(e) { /* 浏览器不支持 */ }
            }

            // 合成值 → 频率映射
            function getMergeFreq(value) {
                if (value <= 3)   return 220;
                if (value <= 7)   return 277;
                if (value <= 15)  return 330;
                if (value <= 31)  return 392;
                if (value <= 63)  return 440;
                if (value <= 127) return 523;
                if (value <= 255) return 587;
                if (value <= 511) return 659;
                if (value <= 1023) return 784;
                if (value <= 2047) return 880;
                if (value === 2049) return 1200;
                return 990;
            }

            function playTone(freq, duration, type, volume) {
                if (!audioCtx) return;
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.type = type || 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume || 0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + duration);
            }

            function playMoveSound() {
                playTone(180, 0.08, 'sine', 0.15);
            }

            function playMergeSound(value) {
                var freq = getMergeFreq(value);
                playTone(freq, 0.25, 'triangle', 0.35);
                if (value >= 128) {
                    setTimeout(function() { playTone(freq * 1.5, 0.15, 'sine', 0.15); }, 60);
                }
            }

            function playItemSound(type) {
                var freqs = {
                    swap:    [330, 440],
                    clear:   [200, 250, 300],
                    scissors:[600, 400],
                    shuffle: [260, 320, 380, 440],
                    plus:    [400, 500, 600],
                    undo:    [500, 400]
                };
                var seq = freqs[type] || [440];
                seq.forEach(function(f, i) {
                    setTimeout(function() { playTone(f, 0.12, 'sine', 0.25); }, i * 70);
                });
            }

            function playWinSound() {
                if (!audioCtx) return;
                [262, 330, 392, 523].forEach(function(f, i) {
                    setTimeout(function() { playTone(f, 0.3, 'triangle', 0.4); }, i * 150);
                });
                setTimeout(function() { playTone(1047, 0.6, 'triangle', 0.5); }, 600);
            }

            function playChallengeSound() {
                if (!audioCtx) return;
                // 独特的"叮咚"提醒音效
                playTone(880, 0.15, 'sine', 0.3);
                setTimeout(function() { playTone(1100, 0.15, 'sine', 0.3); }, 100);
                setTimeout(function() { playTone(1320, 0.25, 'triangle', 0.35); }, 200);
            }
            // ============================

            // 判断是否为2的n次幂
            function isPowerOf2(n) {
                return n > 0 && (n & (n - 1)) === 0;
            }
            
            // 撤回奖励里程碑跟踪（每2000分+1次）
            let undoMilestoneCount = 0;
            
            // 初始化最高分
            bestScoreDisplay.textContent = bestScore;
            
            // ============================
            // localStorage 存/读 游戏状态
            // ============================
            const SAVE_KEY = '2049-game-state';

            function saveGameState() {
                const state = {
                    grid,
                    score,
                    items,
                    moveCount,
                    refreshInterval,
                    maxTileValue,
                    gameOver,
                    gameWon,
                    currentLevel,
                    helpCounts,
                    history,
                    undoMilestoneCount
                };
                localStorage.setItem(SAVE_KEY, JSON.stringify(state));
            }

            function loadGameState() {
                const raw = localStorage.getItem(SAVE_KEY);
                if (!raw) return false;
                try {
                    const state = JSON.parse(raw);
                    // 如果存档里游戏已结束，就不恢复
                    if (state.gameOver || state.gameWon) return false;
                    grid = state.grid;
                    score = state.score;
                    items = state.items;
                    moveCount = state.moveCount;
                    refreshInterval = state.refreshInterval;
                    maxTileValue = state.maxTileValue;
                    gameOver = state.gameOver;
                    gameWon = state.gameWon;
                    currentLevel = state.currentLevel || 1;
                    helpCounts = state.helpCounts || { merge: 1, destroy: 1, rearrange: 1 };
                    history = state.history || [];
                    undoMilestoneCount = state.undoMilestoneCount || 0;
                    return true;
                } catch(e) {
                    return false;
                }
            }

            function clearGameState() {
                localStorage.removeItem(SAVE_KEY);
            }
            
            // 初始化游戏
            function initGame() {
                grid = Array(4).fill().map(() => Array(4).fill(0));
                score = 0;
                gameOver = false;
                gameWon = false;
                
                // 每个道具初始各1个，撤回初始3个
                items = { swap: 1, clear: 1, scissors: 1, shuffle: 1, plus: 1, undo: 3 };
                activeItem = null;
                selectedTile = null;
                history = [];
                undoMilestoneCount = 0;
                
                // 重置帮助系统
                helpCounts = { merge: 1, destroy: 1, rearrange: 1 };
                helpActive = false;
                helpMode = null;
                helpSelectedTiles = [];
                updateHelpUI();
                
                // 重置挑战系统
                moveCount = 0;
                refreshInterval = 30;
                maxTileValue = 0;
                mergedValues = [];
                maxMergedPowerOf2 = 4;
                currentLevel = 1;

                updateScore();
                updateItemDisplay();
                updateChallengeDisplay();
                updateLevelDisplay();
                clearTiles();
                gameOverlay.classList.add('hidden');

                // 第一关使用预设布局（4×4，无X位置）
                if (currentLevel === 1) {
                    for (let i = 0; i < 4; i++) {
                        for (let j = 0; j < 4; j++) {
                            grid[i][j] = level1Preset[i][j];
                        }
                    }
                } else {
                    // 生成两个初始方块
                    addRandomTile();
                    addRandomTile();
                }
                
                // 更新最大数字
                updateMaxTileValue();

                // 渲染方块到页面
                renderTiles(grid);
                
                // 保存初始状态到历史
                pushHistory();

                // 持久化
                saveGameState();
            }
            
            // 清除所有方块
            function clearTiles() {
                tileContainer.innerHTML = '';
            }
            
            // 添加随机方块（跳过X位置）
            function addRandomTile() {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0 && !isBlocked(i, j)) {
                            emptyCells.push({ row: i, col: j });
                        }
                    }
                }
                
                if (emptyCells.length === 0) return;
                
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                
                grid[randomCell.row][randomCell.col] = value;
                addTile(randomCell.row, randomCell.col, value, true);
            }
            
            // 根据数值获取对应的颜色类（区间制）
            function getTileColorClass(value) {
                if (value <= 1) return 'tile-gray';
                if (value <= 3) return 'tile-2';
                if (value <= 7) return 'tile-4';
                if (value <= 15) return 'tile-8';
                if (value <= 31) return 'tile-16';
                if (value <= 63) return 'tile-32';
                if (value <= 127) return 'tile-64';
                if (value <= 255) return 'tile-128';
                if (value <= 511) return 'tile-256';
                if (value <= 1023) return 'tile-512';
                if (value <= 2047) return 'tile-1024';
                if (value <= 2048) return 'tile-2048';
                if (value === 2049) return 'tile-2049';
                return 'tile-super';
            }
            
            // 添加一个方块到DOM
            function addTile(row, col, value, isNew = false, isHighlighted = false, isChallenge = false, isSelected = false) {
                const tile = document.createElement('div');
                
                tile.style.position = 'absolute';
                tile.style.width = 'calc((100% - 36px) / 4)';
                tile.style.height = 'calc((100% - 36px) / 4)';
                tile.style.left = `calc(${col} * ((100% - 36px) / 4 + 12px))`;
                tile.style.top = `calc(${row} * ((100% - 36px) / 4 + 12px))`;
                tile.style.borderRadius = '0.25rem';
                tile.style.display = 'flex';
                tile.style.alignItems = 'center';
                tile.style.justifyContent = 'center';
                tile.style.fontWeight = 'bold';
                tile.style.fontSize = value >= 1000 ? '1.5rem' : value >= 100 ? '2rem' : '2.5rem';
                tile.style.zIndex = '10';
                tile.style.cursor = activeItem ? 'pointer' : 'default';
                tile.style.transition = 'left 0.12s ease-in-out, top 0.12s ease-in-out';
                
                tile.textContent = value;
                tile.dataset.row = row;
                tile.dataset.col = col;
                
                // 分配唯一ID
                const tileId = nextTileId++;
                tile.dataset.id = tileId;
                tilePositions[tileId] = {row: row, col: col};
                
                tile.classList.add(getTileColorClass(value));
                
                if (isNew) tile.classList.add('tile-appear');
                if (isHighlighted) tile.classList.add('tile-highlight');
                if (isChallenge) tile.classList.add('tile-challenge');
                if (isSelected) tile.classList.add('tile-selected');
                
                tile.addEventListener('click', () => {
                    // 帮助模式优先处理
                    if (helpActive && helpMode) {
                        if (helpMode === 'merge') {
                            executeMerge(row, col);
                        } else if (helpMode === 'destroy') {
                            executeDestroy(row, col);
                        }
                        return;
                    }
                    
                    // 道具系统
                    if (activeItem && grid[row][col] !== 0) {
                        useItemOnTile(row, col);
                    }
                });
                
                tileContainer.appendChild(tile);
                return tileId;
            }
            
            // 更新分数，并检查撤回奖励里程碑
            function updateScore() {
                scoreDisplay.textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    bestScoreDisplay.textContent = bestScore;
                    localStorage.setItem('2049-best-score', bestScore);
                }
                
                // 每2000分给一次撤回机会
                const milestones = Math.floor(score / 2000);
                if (milestones > undoMilestoneCount) {
                    const gained = milestones - undoMilestoneCount;
                    undoMilestoneCount = milestones;
                    items.undo += gained;
                    showToast(`🎉 每2000分奖励！获得${gained}次撤回机会！`);
                    updateItemDisplay();
                }
                
                // 更新刷新间隔
                refreshInterval = Math.max(10, 30 - 2*Math.floor(score / 2000));
                updateChallengeDisplay();
            }
            
            // 更新挑战显示
            function updateChallengeDisplay() {
                challengeCount.textContent = `${moveCount} / ${refreshInterval}`;
                challengeProgress.style.width = `${(moveCount / refreshInterval) * 100}%`;
            }
            
            // 更新关卡显示
            function updateLevelDisplay() {
                document.getElementById('level-info').textContent = `第${currentLevel}关：目标 ${levelTargets[currentLevel]}`;
            }
            
            // 更新道具显示
            function updateItemDisplay() {
                for (const [type, count] of Object.entries(items)) {
                    itemCounts[type].textContent = count;
                    itemButtons[type].disabled = count <= 0;
                    
                    if (activeItem === type) {
                        itemButtons[type].classList.add('item-active');
                    } else {
                        itemButtons[type].classList.remove('item-active');
                    }
                }
                
                const tiles = tileContainer.querySelectorAll('div');
                tiles.forEach(tile => {
                    tile.style.cursor = activeItem ? 'pointer' : 'default';
                });
            }
            
            // 更新当前最大数字（跳过X位置）
            function updateMaxTileValue() {
                maxTileValue = 0;
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(i, j) && grid[i][j] > maxTileValue) {
                            maxTileValue = grid[i][j];
                        }
                    }
                }
            }
            
            // 检查胜利（根据当前关卡目标），返回是否刚获胜
            function checkWin() {
                if (gameWon) return false;
                var target = levelTargets[currentLevel];
                for (var i = 0; i < 4; i++) {
                    for (var j = 0; j < 4; j++) {
                        if (grid[i][j] === target) {
                            if (currentLevel === 1) {
                                // 第一关通关，重置盘面和道具，进入第二关
                                currentLevel = 2;
                                // 重置分数
                                score = 0;
                                // 重置盘面
                                grid = Array(4).fill().map(() => Array(4).fill(0));
                                // 重置道具
                                items = { swap: 1, clear: 1, scissors: 1, shuffle: 1, plus: 1, undo: 3 };
                                activeItem = null;
                                selectedTile = null;
                                // 重置挑战系统
                                moveCount = 0;
                                maxMergedPowerOf2 = 4;
                                mergedValues = [];
                                // 清空方块显示
                                clearTiles();
                                // 生成两个新方块
                                addRandomTile();
                                addRandomTile();
                                // 更新显示
                                updateScore();
                                updateItemDisplay();
                                updateChallengeDisplay();
                                updateLevelDisplay();
                                // 保存状态
                                saveGameState();
                                // 播放音效并显示提示
                                playWinSound();
                                showToast('🎉 第一关通关！进入第二关，目标：2049');
                                return true;
                            } else if (currentLevel === 2) {
                                // 第二关通关，游戏胜利
                                gameWon = true;
                                playWinSound();
                                setTimeout(function() { showOverlay('你赢了！'); }, 300);
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            // ============================
            // 撤回历史栈（独立于持久化历史）
            // ============================
            function pushHistory() {
                history.push({
                    grid: JSON.parse(JSON.stringify(grid)),
                    score: score,
                    moveCount: moveCount,
                    maxTileValue: maxTileValue,
                    items: JSON.parse(JSON.stringify(items)),
                    currentLevel: currentLevel,
                    undoMilestoneCount: undoMilestoneCount
                });
                // 只保留最近20步
                if (history.length > 20) {
                    history.shift();
                }
            }

            // 执行撤回
            function doUndo() {
                if (items.undo <= 0) return;
                // history 最后一条是当前状态，倒数第二条是上一步
                if (history.length < 2) {
                    showToast('没有可撤回的步骤！');
                    return;
                }
                // 消耗1次撤回机会
                items.undo--;
                // 弹出当前状态
                history.pop();
                // 恢复上一步状态（不弹出，保持可继续撤回）
                const prev = history[history.length - 1];
                grid = JSON.parse(JSON.stringify(prev.grid));
                score = prev.score;
                moveCount = prev.moveCount;
                maxTileValue = prev.maxTileValue;
                currentLevel = prev.currentLevel || 1;
                // 恢复道具但不恢复undo数量（已经消耗了1次）
                const restoredItems = JSON.parse(JSON.stringify(prev.items));
                restoredItems.undo = items.undo;
                items = restoredItems;
                undoMilestoneCount = prev.undoMilestoneCount;

                gameOver = false;
                gameWon = false;

                scoreDisplay.textContent = score;
                updateItemDisplay();
                updateChallengeDisplay();
                updateLevelDisplay();
                renderTiles(prev.grid); // 传同一个grid，无合并动画
                gameOverlay.classList.add('hidden');

                saveGameState();
                showToast('✅ 已撤回上一步！');
            }
            
            // 检查玩家是否有可用道具
            function hasAnyItems() {
                for (const count of Object.values(items)) {
                    if (count > 0) return true;
                }
                return false;
            }
            
            // 移动方块
            function move(direction) {
                if (gameOver || gameWon || activeItem || helpActive) return;
                
                let moved = false;
                const oldGrid = JSON.parse(JSON.stringify(grid));
                const oldScore = score;
                
                mergedValues = [];
                
                switch (direction) {
                    case 'up':    moved = moveUp();    break;
                    case 'down':  moved = moveDown();  break;
                    case 'left':  moved = moveLeft();  break;
                    case 'right': moved = moveRight(); break;
                }
                
                if (moved) {
                    playMoveSound();
                    // 播放所有合并音效
                    for (var mi = 0; mi < mergedValues.length; mi++) {
                        playMergeSound(mergedValues[mi]);
                    }
                    
                    moveCount++;
                    
                    // 保存历史
                    pushHistory();
                    
                    updateMaxTileValue();
                    
                    let itemCount = 0;
                    for (const value of mergedValues) {
                        if (value >= 32) itemCount++;
                    }
                    
                    if (itemCount > 0) {
                        giveRandomItems(itemCount);
                        showToast(`合成成功！获得${itemCount}个道具！`);
                    }
                    
                    // 使用带动画的渲染
                    renderTilesWithAnimation(oldGrid);
                    
                    setTimeout(() => {
                        // 挑战触发时不生成普通2/4方块，仅生成挑战方块
                        if (moveCount >= refreshInterval) {
                            refreshRandomTileWithAnimation();
                            moveCount = 0;
                        } else {
                            addRandomTileWithAnimation();
                        }

                        if (!checkWin() && isGameOver()) {
                            gameOver = true;
                            showOverlay('游戏结束！');
                        }
                        
                        updateChallengeDisplay();
                        saveGameState();
                    }, 200); // 等待滑动和合并动画完成
                }
            }
            
            // 给予随机道具（不含undo）
            function giveRandomItems(count) {
                const itemTypes = ['swap', 'clear', 'scissors', 'shuffle', 'plus'];
                
                for (let i = 0; i < count; i++) {
                    const randomType = itemTypes[Math.floor(Math.random() * itemTypes.length)];
                    items[randomType]++;
                }
                
                updateItemDisplay();
            }

            
            // 添加随机方块（带动画，跳过X位置）
            function addRandomTileWithAnimation() {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0 && !isBlocked(i, j)) {
                            emptyCells.push({ row: i, col: j });
                        }
                    }
                }
                
                if (emptyCells.length === 0) return;
                
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                
                grid[randomCell.row][randomCell.col] = value;
                addTile(randomCell.row, randomCell.col, value, true);
            }
            
            // 刷新随机挑战方块（带动画，跳过X位置）
            function refreshRandomTileWithAnimation() {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0 && !isBlocked(i, j)) {
                            emptyCells.push({ row: i, col: j });
                        }
                    }
                }
                
                if (emptyCells.length === 0) {
                    showToast('没有空位，挑战方块无法生成！');
                    return;
                }
                
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.floor(Math.random() * (maxMergedPowerOf2 - 1)) + 1;
                
                grid[randomCell.row][randomCell.col] = value;
                addTile(randomCell.row, randomCell.col, value, false, false, true);
                
                playChallengeSound();
                showToast(`⚡ 挑战刷新：出现了 ${value}！`);
                
                updateMaxTileValue();
                pushHistory();
                
                if (!checkWin() && isGameOver()) {
                    gameOver = true;
                    showOverlay('游戏结束！');
                }
            }
            
            // 显示提示信息
            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-board-2049 text-white px-4 py-2 rounded-md font-bold z-50';
                toast.textContent = message;
                toast.style.animation = 'appear 0.3s ease-in-out';
                
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease-in-out';
                    setTimeout(() => {
                        document.body.removeChild(toast);
                    }, 300);
                }, 1500);
            }
            
            // 重新渲染所有方块（带动画效果）
            function renderTilesWithAnimation(oldGrid) {
                const tileSize = 'calc((100% - 36px) / 4)';
                const gap = '12px';
                
                // 为所有现有方块设置到最终位置（触发CSS transition）
                const tiles = tileContainer.querySelectorAll('div');
                
                // 记录新grid中每个位置的方块应该来自哪
                // 我们先清除所有方块，然后用动画重新创建
                // 为了实现动画，我们需要记录旧位置
                
                // 简单方案：直接重新渲染，但新方块会有appear动画，合并方块会有merge动画
                clearTiles();
                
                // 重新创建所有方块
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] !== 0) {
                            // 判断是否是新方块（在oldGrid中这个位置是0）
                            const isNew = !oldGrid || oldGrid[i][j] === 0;
                            // 判断是否是合并的方块
                            const isMerged = oldGrid && oldGrid[i][j] !== 0 && oldGrid[i][j] !== grid[i][j];
                            
                            addTile(i, j, grid[i][j], isNew);
                            
                            // 如果是合并的方块，添加合并动画
                            if (isMerged) {
                                const tiles = tileContainer.querySelectorAll('div');
                                const lastTile = tiles[tiles.length - 1];
                                setTimeout(() => {
                                    lastTile.classList.add('tile-merge');
                                }, 50);
