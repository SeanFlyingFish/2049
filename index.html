                            mergedValues.push(cells[i].value);
                            // 记录合成位置：向上合并后，新方块在第i个非X位置
                            let posIdx = 0;
                            for (let j = 0; j < 4; j++) {
                                if (!isBlocked(j, col)) {
                                    if (posIdx === i) {
                                        mergedPositions.push({row: j, col: col});
                                        break;
                                    }
                                    posIdx++;
                                }
                            }
                            if (isPowerOf2(val) && isPowerOf2(cells[i].value)) {
                                maxMergedPowerOf2 = Math.max(maxMergedPowerOf2, cells[i].value);
                            }
                            cells.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    
                    // 填回grid和frozenGrid（只填非X位置）
                    let idx = 0;
                    for (let i = 0; i < 4; i++) {
                        if (!isBlocked(i, col)) {
                            const oldVal = grid[i][col];
                            const oldFrozen = frozenGrid[i][col];
                            if (idx < cells.length) {
                                grid[i][col] = cells[idx].value;
                                frozenGrid[i][col] = cells[idx].frozen;
                                idx++;
                            } else {
                                grid[i][col] = 0;
                                frozenGrid[i][col] = false;
                            }
                            if (oldVal !== grid[i][col] || oldFrozen !== frozenGrid[i][col]) moved = true;
                        }
                    }
                }
                
                updateScore();
                return moved;
            }
            
            // 向下移动（保持X位置不变）
            function moveDown() {
                let moved = false;
                
                for (let col = 0; col < 4; col++) {
                    // 收集非X位置的单元格（包含数值和冰冻状态）
                    let cells = [];
                    for (let i = 0; i < 4; i++) {
                        if (!isBlocked(i, col) && grid[i][col] !== 0) {
                            cells.push({
                                value: grid[i][col],
                                frozen: frozenGrid[i][col]
                            });
                        }
                    }
                    
                    // 合并（从下向上，冰冻方块不参与合并）
                    for (let i = cells.length - 1; i > 0; i--) {
                        if (canMerge(cells[i].value, cells[i-1].value, cells[i].frozen, cells[i-1].frozen)) {
                            const val = cells[i].value;
                            cells[i].value += cells[i - 1].value;
                            score += cells[i].value;
                            mergedValues.push(cells[i].value);
                            // 记录合成位置：向下合并后，新方块在第i个非X位置（从下数）
                            let posIdx = cells.length - 1;
                            for (let j = 3; j >= 0; j--) {
                                if (!isBlocked(j, col)) {
                                    if (posIdx === i) {
                                        mergedPositions.push({row: j, col: col});
                                        break;
                                    }
                                    posIdx--;
                                }
                            }
                            if (isPowerOf2(val) && isPowerOf2(cells[i].value)) {
                                maxMergedPowerOf2 = Math.max(maxMergedPowerOf2, cells[i].value);
                            }
                            cells.splice(i - 1, 1);
                            i--;
                            moved = true;
                        }
                    }
                    
                    // 填回grid和frozenGrid（从下向上，只填非X位置）
                    let idx = cells.length - 1;
                    for (let i = 3; i >= 0; i--) {
                        if (!isBlocked(i, col)) {
                            const oldVal = grid[i][col];
                            const oldFrozen = frozenGrid[i][col];
                            if (idx >= 0) {
                                grid[i][col] = cells[idx].value;
                                frozenGrid[i][col] = cells[idx].frozen;
                                idx--;
                            } else {
                                grid[i][col] = 0;
                                frozenGrid[i][col] = false;
                            }
                            if (oldVal !== grid[i][col] || oldFrozen !== frozenGrid[i][col]) moved = true;
                        }
                    }
                }
                
                updateScore();
                return moved;
            }
            
            // 给予随机道具（不含undo）- 连击动态调整概率
            function giveRandomItems(count) {
                const itemTypes = ['swap', 'clear', 'scissors', 'shuffle', 'plus'];
                // 基础权重：shuffle(20) > clear(16) > scissors(12) > swap(8) > plus(4)
                const baseWeights = {
                    shuffle: 20,
                    clear: 16,
                    scissors: 12,
                    swap: 8,
                    plus: 4
                };
    
                // 连击动态加成：shuffle不变，其余按规则递增
                const dynamicWeights = [
                    baseWeights.swap + 6 * combo32Count,    // swap: 8 + 6*连击数
                    baseWeights.clear + 2 * combo32Count,   // clear: 16 + 2*连击数
                    baseWeights.scissors + 4 * combo32Count,// scissors: 12 + 4*连击数
                    baseWeights.shuffle,                    // shuffle: 固定20不变
                    baseWeights.plus + 8 * combo32Count     // plus: 4 + 8*连击数
                ];
            
                for (let i = 0; i < count; i++) {
                    const totalWeight = dynamicWeights.reduce((a, b) => a + b, 0);
                    let random = Math.random() * totalWeight;
                    let selectedIndex = 0;
                    
                    for (let j = 0; j < dynamicWeights.length; j++) {
                        random -= dynamicWeights[j];
                        if (random <= 0) {
                            selectedIndex = j;
                            break;
                        }
                    }
            
                    items[itemTypes[selectedIndex]]++;
                }
    
    updateItemDisplay();
}

            
            // 添加随机方块（带动画，跳过X位置）
            function addRandomTileWithAnimation() {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0 && !isBlocked(i, j)) {
                            emptyCells.push({ row: i, col: j });
                        }
                    }
                }
                
                if (emptyCells.length === 0) return;
                
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                
                grid[randomCell.row][randomCell.col] = value;
                addTile(randomCell.row, randomCell.col, value, true);
            }
            
            // 刷新随机挑战方块（带动画，跳过X位置）
            function refreshRandomTileWithAnimation() {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0 && !isBlocked(i, j)) {
                            emptyCells.push({ row: i, col: j });
                        }
                    }
                }
                
                if (emptyCells.length === 0) {
                    showToast('没有空位，挑战方块无法生成！');
                    return;
                }
                
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                let value;
                let isFrozen = false;
                
                // 按maxMergedPowerOf2阈值计算冰冻方块概率
                let frozenProbability = 0;
                if (maxMergedPowerOf2 >= 1024) {
                    frozenProbability = 0.4; // 40%
                } else if (maxMergedPowerOf2 >= 512) {
                    frozenProbability = 0.3; // 30%
                } else if (maxMergedPowerOf2 >= 256) {
                    frozenProbability = 0.2; // 20%
                } else if (maxMergedPowerOf2 >= 128) {
                    frozenProbability = 0.1; // 10%
                }

                if (Math.random() < frozenProbability) {
                    // 按加权概率生成冰冻方块数值：8(50%)、16(30%)、32(12%)、64(8%)
                    const valueRand = Math.random();
                    if (valueRand < 0.50) {
                        value = 8;
                    } else if (valueRand < 0.80) { // 0.5 + 0.3
                        value = 16;
                    } else if (valueRand < 0.92) { // 0.8 + 0.12
                        value = 32;
                    } else { // 剩余 0.08
                        value = 64;
                    }
                    
                    isFrozen = true;
                    showToast(`❄️ 冰冻挑战：出现了冰冻 ${value}！`);
                    
                    // 重置历史记录，无法回到冰冻方块出现之前的状态
                    history = [{
                        grid: JSON.parse(JSON.stringify(grid)),
                        frozenGrid: JSON.parse(JSON.stringify(frozenGrid)),
                        score: score,
                        moveCount: moveCount,
                        maxTileValue: maxTileValue,
                        items: JSON.parse(JSON.stringify(items)),
                        currentLevel: currentLevel,
                        undoMilestoneCount: undoMilestoneCount,
                        challengeBuffer: challengeBuffer,
                        combo32Count: combo32Count
                    }];
                }else {
                    // 普通挑战方块
                    value = Math.floor(Math.random() * (maxMergedPowerOf2 - 1)) + 1;
                }
                
                grid[randomCell.row][randomCell.col] = value;
                frozenGrid[randomCell.row][randomCell.col] = isFrozen;
                addTile(randomCell.row, randomCell.col, value, false, false, true, false, isFrozen);
                
                playChallengeSound();
                if (!isFrozen) {
                    showToast(`⚡ 挑战刷新：出现了 ${value}！`);
                }
                
                updateMaxTileValue();
                pushHistory();
                
                if (!checkWin() && isGameOver()) {
                    gameOver = true;
                    showOverlay('游戏结束！');
                }
            }
            
            // 显示提示信息
            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 bg-board-2049 text-white px-4 py-2 rounded-md font-bold z-50';
                toast.textContent = message;
                toast.style.animation = 'appear 0.3s ease-in-out';
                
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease-in-out';
                    setTimeout(() => {
                        document.body.removeChild(toast);
                    }, 300);
                }, 1500);
            }
            
            // 重新渲染所有方块（带动画效果）
            function renderTilesWithAnimation(oldGrid) {
                // 记录旧位置的方块
                const oldTiles = new Map();
                tileContainer.querySelectorAll('div').forEach(tile => {
                    const row = parseInt(tile.dataset.row);
                    const col = parseInt(tile.dataset.col);
                    oldTiles.set(`${row}-${col}`, tile);
                });

                // 移动和更新现有方块
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const key = `${i}-${j}`;
                        if (grid[i][j] !== 0) {
                            if (oldTiles.has(key)) {
                                // 方块位置不变，更新数值和样式
                                const tile = oldTiles.get(key);
                                if (oldGrid[i][j] !== grid[i][j]) {
                                    // 合并后的方块
                                    tile.textContent = grid[i][j];
                                    tile.className = getTileColorClass(grid[i][j]);
                                    if (frozenGrid[i][j]) tile.classList.add('tile-frozen');
                                    tile.classList.add('tile-merge');
                                    setTimeout(() => tile.classList.remove('tile-merge'), 200);
                                }
                                oldTiles.delete(key);
                            } else {
                                // 新方块或移动过来的方块
                                addTile(i, j, grid[i][j], !oldGrid || oldGrid[i][j] === 0, false, false, false, frozenGrid[i][j]);
                            }
                        }
                    }
                }

                // 删除消失的方块
                oldTiles.forEach(tile => {
                    tile.classList.add('tile-destroying');
                    setTimeout(() => tile.remove(), 90);
                });
            }
            
            // 根据位置查找tile元素
            function findTileElementAtPosition(row, col) {
                const tiles = tileContainer.querySelectorAll('div');
                for (let tile of tiles) {
                    if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                        return tile;
                    }
                }
                return null;
            }
            
           // 在removeTileElement函数中添加事件监听器移除
           function removeTileElement(row, col) {
               const tile = findTileElementAtPosition(row, col);
               if (tile) {
                   // 克隆元素并替换，自动移除所有事件监听器
                   const clone = tile.cloneNode(true);
                   tile.parentNode.replaceChild(clone, tile);
                   clone.classList.add('tile-destroying');
                   setTimeout(() => clone.remove(), 90);
               }
           }
            
            // 重新渲染所有方块（无动画，用于重置等情况）
            function renderTiles(oldGrid) {
                clearTiles();
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] !== 0) {
                            const isMerged = oldGrid && oldGrid[i] && oldGrid[i][j] !== 0 && oldGrid[i][j] !== grid[i][j];
                            addTile(i, j, grid[i][j], !isMerged, false, false, false, frozenGrid[i][j]);
                            
                            if (isMerged) {
                                const tiles = tileContainer.querySelectorAll('div');
                                const lastTile = tiles[tiles.length - 1];
                                lastTile.classList.add('tile-merge');
                            }
                        }
                    }
                }
            }
            
            // 检查游戏是否结束（考虑X位置）
            function isGameOver() {
                // 检查是否有空格（跳过X位置）
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0 && !isBlocked(i, j)) return false;
                    }
                }
                
                // 检查是否有可合并的相邻方块（跳过X位置，考虑冰冻状态）
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (isBlocked(i, j) || grid[i][j] === -1) continue;
                        if (j < 3 && !isBlocked(i, j + 1) && canMerge(grid[i][j], grid[i][j + 1], frozenGrid[i][j], frozenGrid[i][j + 1])) return false;
                        if (i < 3 && !isBlocked(i + 1, j) && canMerge(grid[i][j], grid[i + 1][j], frozenGrid[i][j], frozenGrid[i + 1][j])) return false;
                    }
                }
                
                if (hasAnyItems()) {
                    showToast('棋盘满了！快使用道具继续游戏！');
                    return false;
                }
                
                return true;
            }
            
            // 显示覆盖层
            function showOverlay(title) {
                overlayTitle.textContent = title;
                gameOverlay.classList.remove('hidden');
                clearGameState();
            }
            
            // 道具系统 - 选择道具
            function selectItem(type) {
                if (items[type] <= 0) return;

                // 撤回道具直接执行
                if (type === 'undo') {
                    doUndo();
                    return;
                }
                
                if (activeItem === type) {
                    activeItem = null;
                    selectedTile = null;
                    document.getElementById('item-hint').textContent = itemHints.default;
                } else {
                    activeItem = type;
                    selectedTile = null;
                    document.getElementById('item-hint').textContent = itemHints[type];
                    
                    if (type === 'shuffle') {
                        useShuffleItem();
                        return;
                    }
                }
                
                updateItemDisplay();
                renderTiles(grid);
                
                const tiles = tileContainer.querySelectorAll('div');
                tiles.forEach(tile => {
                    if (activeItem && tile.dataset.frozen !== 'true') {
                        tile.classList.add('tile-highlight');
                    } else {
                        tile.classList.remove('tile-highlight');
                        tile.classList.remove('tile-selected');
                    }
                });
            }
            
            // 使用深度优先搜索(DFS)查找所有连通的同色方块（跳过X位置）
            function findConnectedSameColorTiles(startRow, startCol) {
                // 冰冻方块不参与同色消除
                if (frozenGrid[startRow][startCol]) return [];
                if (isBlocked(startRow, startCol) || grid[startRow][startCol] === -1) return [];
                const targetColorClass = getTileColorClass(grid[startRow][startCol]);
                const visited = Array(4).fill().map(() => Array(4).fill(false));
                const connected = [];
                
                function dfs(row, col) {
                    if (row < 0 || row >= 4 || col < 0 || col >= 4) return;
                    if (visited[row][col]) return;
                    if (isBlocked(row, col) || grid[row][col] === -1 || frozenGrid[row][col]) return;
                    if (grid[row][col] === 0) return;
                    if (getTileColorClass(grid[row][col]) !== targetColorClass) return;
                    
                    visited[row][col] = true;
                    connected.push({ row, col, value: grid[row][col] });
                    
                    dfs(row - 1, col);
                    dfs(row + 1, col);
                    dfs(row, col - 1);
                    dfs(row, col + 1);
                }
                
                dfs(startRow, startCol);
                return connected;
            }
            
            // 道具系统 - 在方块上使用道具
            function useItemOnTile(row, col) {
                // 无法对冰冻方块使用道具
                if (frozenGrid[row][col]) {
                    showToast('无法对冰冻方块使用道具！');
                    return;
                }
                
                if (!activeItem || items[activeItem] <= 0) return;
                
                const value = grid[row][col];
                if (value === 0) return;
                
                let success = false;
                const oldGrid = JSON.parse(JSON.stringify(grid));
                
                switch (activeItem) {
                    case 'swap':
                        // 交换道具：可交换棋盘上任意两个方块
                        if (!selectedTile) {
                            selectedTile = { row, col };
                            showToast('已选择第一个方块，请选择第二个方块（任意位置）');
                            
                            renderTiles(grid);
                            const tiles = tileContainer.querySelectorAll('div');
                            tiles.forEach(tile => {
                                if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                                    tile.classList.add('tile-selected');
                                }
                                if (tile.dataset.frozen !== 'true') {
                                    tile.classList.add('tile-highlight');
                                }
                            });
                            return;
                        } else {
                            if (selectedTile.row === row && selectedTile.col === col) {
                                // 点同一个方块 → 取消选择
                                selectedTile = null;
                                showToast('已取消选择');
                                renderTiles(grid);
                                const tiles = tileContainer.querySelectorAll('div');
                                tiles.forEach(tile => {
                                    if (tile.dataset.frozen !== 'true') {
                                        tile.classList.add('tile-highlight');
                                    }
                                });
                                return;
                            }
                            
                            // 任意两个方块都可以交换
                            [grid[selectedTile.row][selectedTile.col], grid[row][col]] = 
                            [grid[row][col], grid[selectedTile.row][selectedTile.col]];
                            // 同时交换冰冻状态
                            [frozenGrid[selectedTile.row][selectedTile.col], frozenGrid[row][col]] = 
                            [frozenGrid[row][col], frozenGrid[selectedTile.row][col]];
                            
                            success = true;
                            showToast('交换成功！');
                        }
                        break;
                        
                    case 'clear':
                        const connectedTiles = findConnectedSameColorTiles(row, col);
                        
                        if (connectedTiles.length >= 3) {
                            let sum = 0;
                            for (const tile of connectedTiles) sum += tile.value;
                            const average = Math.round(sum / connectedTiles.length);
                            
                            for (const tile of connectedTiles) {
                                grid[tile.row][tile.col] = 0;
                                frozenGrid[tile.row][tile.col] = false;
                            }
                            grid[row][col] = average;
                            
                            success = true;
                            showToast(`消除了${connectedTiles.length}个同色方块，生成了${average}！`);
                        } else {
                            showToast(`需要至少3个相连的同色方块！当前只有${connectedTiles.length}个`);
                            return;
                        }
                        break;
                        
                    case 'scissors':
                        if (value > 2) {
                            grid[row][col] = Math.floor(value / 2);
                            success = true;
                            showToast(`将${value}减半为${grid[row][col]}！`);
                        } else {
                            showToast('不能对2使用剪刀！');
                            return;
                        }
                        break;
                        
                    case 'plus':
                        grid[row][col] = value + 1;
                        success = true;
                        showToast(`将${value}变成了${value + 1}！`);
                        break;
                }
                
                if (success) {
                    playItemSound(activeItem);
                    items[activeItem]--;
                    activeItem = null;
                    selectedTile = null;
                    document.getElementById('item-hint').textContent = itemHints.default;
                    clearAllHighlights();

                    combo32Count = 0;
                    
                    updateItemDisplay();
                    renderTilesWithAnimation(oldGrid);
                    updateMaxTileValue();
                    pushHistory();
                    saveGameState();
                    
                    if (!checkWin() && isGameOver()) {
                        gameOver = true;
                        showOverlay('游戏结束！');
                    }
                }
            }
            
            // 使用洗牌道具（保持X位置不变）
            function useShuffleItem() {
                const oldGrid = JSON.parse(JSON.stringify(grid));
                // 只收集非冰冻方块的数值
                const values = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(i, j) && grid[i][j] !== 0 && !frozenGrid[i][j]) {
                            values.push(grid[i][j]);
                        }
                    }
                }
                
                // 打乱顺序
                for (let i = values.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [values[i], values[j]] = [values[j], values[i]];
                }
                
                // 重新填回grid，冰冻方块位置和数值保持不变
                let index = 0;
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (isBlocked(i, j)) {
                            grid[i][j] = -1;
                        } else if (frozenGrid[i][j]) {
                            // 冰冻方块保持不变
                        } else if (index < values.length) {
                            grid[i][j] = values[index++];
                            frozenGrid[i][j] = false;
                        } else {
                            grid[i][j] = 0;
                            frozenGrid[i][j] = false;
                        }
                    }
                }
                
                items.shuffle--;
                activeItem = null;
                selectedTile = null;
                document.getElementById('item-hint').textContent = itemHints.default;
                
                updateItemDisplay();
                renderTilesWithAnimation(oldGrid);
                updateMaxTileValue();
                pushHistory();
                saveGameState();
                
                showToast('所有非冰冻方块已打乱！');
                combo32Count = 0;

                if (!checkWin() && isGameOver()) {
                    gameOver = true;
                    showOverlay('游戏结束！');
                }
            }
            
            // 键盘事件监听
            document.addEventListener('keydown', (e) => {
                initAudio();
                if (activeItem && e.key === 'Escape') {
                    activeItem = null;
                    selectedTile = null;
                    document.getElementById('item-hint').textContent = itemHints.default;
                    updateItemDisplay();
                    
                    const tiles = tileContainer.querySelectorAll('div');
                    tiles.forEach(tile => {
                        tile.classList.remove('tile-highlight');
                        tile.classList.remove('tile-selected');
                    });
                    return;
                }
                
                switch (e.key) {
                    case 'ArrowUp':    e.preventDefault(); move('up');    break;
                    case 'ArrowDown':  e.preventDefault(); move('down');  break;
                    case 'ArrowLeft':  e.preventDefault(); move('left');  break;
                    case 'ArrowRight': e.preventDefault(); move('right'); break;
                }
            });
            
            // 触摸滑动事件（只在棋盘区域内响应，并阻止页面滚动）
            let touchStartX = 0;
            let touchStartY = 0;
            let touchMoved = false; // 是否发生了真实的滑动

            const gameBoard = document.getElementById('game-board');

            gameBoard.addEventListener('touchstart', (e) => {
                initAudio();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchMoved = false;
                // 不在 touchstart 里 preventDefault，让 click 事件可以正常触发
            }, { passive: true });

            gameBoard.addEventListener('touchmove', (e) => {
                const dx = Math.abs(e.touches[0].clientX - touchStartX);
                const dy = Math.abs(e.touches[0].clientY - touchStartY);
                // 超过 8px 才认为是滑动，阻止页面滚动
                if (dx > 8 || dy > 8) {
                    touchMoved = true;
                    e.preventDefault();
                }
            }, { passive: false });

            gameBoard.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;

                if (touchMoved) {
                    // 真实滑动：执行游戏移动，阻止默认行为（防止 click 误触）
                    handleSwipe(diffX, diffY);
                    e.preventDefault();
                }
                // 轻触（tap）：不 preventDefault，让 click 事件冒泡到方块元素
                touchMoved = false;
            }, { passive: false });

            function handleSwipe(diffX, diffY) {
                const minSwipeDistance = 30;
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (Math.abs(diffX) > minSwipeDistance) {
                        move(diffX > 0 ? 'right' : 'left');
                    }
                } else {
                    if (Math.abs(diffY) > minSwipeDistance) {
                        move(diffY > 0 ? 'down' : 'up');
                    }
                }
            }
            
            // 道具按钮点击事件
            for (const [type, button] of Object.entries(itemButtons)) {
                button.addEventListener('click', () => selectItem(type));
            }
            
            // 新游戏按钮点击事件
            newGameButton.addEventListener('click', () => {
                clearGameState();
                initGame();
            });
            overlayButton.addEventListener('click', () => {
                clearGameState();
                initGame();
            });
            
            // 启动时：尝试恢复存档，否则新游戏
            const restored = loadGameState();
            if (restored) {
                activeItem = null;
                selectedTile = null;
                mergedValues = [];
                updateScore();
                updateItemDisplay();
                updateChallengeDisplay();
                updateLevelDisplay();
                updateHelpUI();
                clearTiles();
                gameOverlay.classList.add('hidden');
                renderTiles(grid);
                showToast('✅ 已恢复上次游戏进度！');
            } else {
                initGame();
            }
        });
    </script>
    
    <!-- 悬浮帮助按钮 -->
    <button id="help-button" class="help-button" title="我来助你（每局3次）">我来助你</button>
    
    <!-- 帮助效果选择弹窗 -->
    <div id="help-overlay" class="help-overlay hidden">
        <div class="help-modal">
            <h3>选择帮助效果</h3>
            
            <div class="help-option" data-type="merge">
                <h4>🔮 融合 <span class="help-option-count">（剩余1次）</span></h4>
                <p>点击1个方块，融合周围的数字变为平均数。</p>
            </div>
            
            <div class="help-option" data-type="destroy">
                <h4>💥 爆炸 <span class="help-option-count">（剩余1次）</span></h4>
                <p>选择至多3个方块，直接摧毁。</p>
            </div>
            
            <div class="help-option" data-type="rearrange">
                <h4>📐 整队 <span class="help-option-count">（剩余1次）</span></h4>
                <p>将所有方块按数字从小到大，以S形顺序排列。</p>
            </div>
            
            <button id="help-cancel" class="help-cancel">取消</button>
        </div>
    </div>
</body>
</html>
