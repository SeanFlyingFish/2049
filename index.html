<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2049</title>
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-2049': '#faf8ef',
                        'board-2049': '#bbada0',
                        'cell-2049': '#cdc1b4',
                        'text-light': '#f9f6f2',
                        'text-dark': '#776e65',
                        'item-swap': '#8f7a66',
                        'item-clear': '#e74c3c',
                        'item-scissors': '#f39c12',
                        'item-shuffle': '#3498db',
                        'item-plus': '#2ecc71',
                        'item-undo': '#9b59b6',
                        'challenge': '#9b59b6',
                    },
                    fontFamily: {
                        'game': ['Clear Sans', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .tile-gray { background-color: #ffffff; color: #776e65; }
            .tile-2 { background-color: #eee4da; color: #776e65; }
            .tile-4 { background-color: #ede0c8; color: #776e65; }
            .tile-8 { background-color: #f2b179; color: #f9f6f2; }
            .tile-16 { background-color: #f59563; color: #f9f6f2; }
            .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
            .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
            .tile-128 { background-color: #edcf72; color: #f9f6f2; }
            .tile-256 { background-color: #cbd529; color: #f9f6f2; }
            .tile-512 { background-color: #79cd44; color: #f9f6f2; }
            .tile-1024 { background-color: #30ace4; color: #f9f6f2; }
            .tile-2048 { background-color: #d02c3f; color: #f9f6f2; }
            .tile-2049 { background-color: #e74c3c; color: #f9f6f2; }
            .tile-super { background-color: #3c3a32; color: #f9f6f2; }
            
            .tile-appear {
                animation: appear 0.2s ease-in-out;
            }
            
            .tile-merge {
                animation: merge 0.2s ease-in-out;
            }
            
            .tile-highlight {
                animation: highlight 0.5s ease-in-out infinite alternate;
            }
            
            .tile-selected {
                animation: selected 0.3s ease-in-out;
                box-shadow: 0 0 15px 5px rgba(0, 255, 0, 0.8);
            }
            
            .tile-challenge {
                animation: challenge-appear 0.5s ease-in-out;
                box-shadow: 0 0 10px 3px rgba(155, 89, 182, 0.7);
            }
            
            @keyframes appear {
                0% { transform: scale(0); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }
            
            @keyframes merge {
                0% { transform: scale(1); }
                50% { transform: scale(1.2); }
                100% { transform: scale(1); }
            }
            
            @keyframes highlight {
                0% { box-shadow: 0 0 5px 2px rgba(255, 255, 255, 0.5); }
                100% { box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.8); }
            }
            
            @keyframes selected {
                0% { transform: scale(1); }
                50% { transform: scale(1.1); }
                100% { transform: scale(1); }
            }
            
            @keyframes challenge-appear {
                0% { transform: scale(0) rotate(0deg); opacity: 0; }
                50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
                100% { transform: scale(1) rotate(360deg); opacity: 1; }
            }
            
            .help-overlay.hidden {
                display: none;
            }
            
            /* 悬浮帮助按钮 */
            .help-button {
                position: fixed;
                bottom: 30px;
                right: 30px;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: linear-gradient(135deg, #9b59b6, #8e44ad);
                color: white;
                border: none;
                box-shadow: 0 4px 12px rgba(155, 89, 182, 0.4);
                cursor: pointer;
                font-size: 12px;
                font-weight: bold;
                z-index: 1000;
                transition: all 0.3s ease;
            }
            
            .help-button:hover:not(:disabled) {
                transform: scale(1.1);
                box-shadow: 0 6px 20px rgba(155, 89, 182, 0.6);
            }
            
            .help-button:disabled {
                background: #bdc3c7;
                cursor: not-allowed;
                box-shadow: none;
            }
            
            /* 帮助效果选择弹窗 */
            .help-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.7);
                z-index: 9998;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .help-modal {
                background: #faf8ef;
                border-radius: 12px;
                padding: 24px;
                max-width: 400px;
                width: 90%;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            }
            
            .help-modal h3 {
                text-align: center;
                font-size: 20px;
                font-weight: bold;
                margin-bottom: 16px;
                color: #776e65;
            }
            
            .help-option {
                background: white;
                border: 2px solid #cdc1b4;
                border-radius: 8px;
                padding: 16px;
                margin-bottom: 12px;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            
            .help-option:hover {
                border-color: #9b59b6;
                background: #f5f0ff;
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(155, 89, 182, 0.2);
            }
            
            .help-option h4 {
                font-size: 16px;
                font-weight: bold;
                color: #9b59b6;
                margin-bottom: 8px;
            }
            
            .help-option p {
                font-size: 14px;
                color: #776e65;
                line-height: 1.4;
            }
            
            .help-cancel {
                width: 100%;
                padding: 10px;
                background: #bdc3c7;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                margin-top: 8px;
            }
            
            .help-cancel:hover {
                background: #95a5a6;
            }

            .help-option-disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .help-option-disabled:hover {
                border-color: #cdc1b4;
                background: white;
                transform: none;
                box-shadow: none;
            }
            
            @keyframes tile-destroy {
                0% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.2); opacity: 0.5; }
                100% { transform: scale(0); opacity: 0; }
            }
            
            .tile-destroying {
                animation: tile-destroy 0.3s ease-out forwards;
            }
            
            @keyframes tile-merge {
                0% { transform: scale(1); }
                50% { transform: scale(1.3); }
                100% { transform: scale(1); }
            }
            
            .tile-merging {
                animation: tile-merge 0.3s ease-out;
            }
            
            .game-overlay {
                background-color: rgba(238, 228, 218, 0.73);
                z-index: 9999;
            }
            
            .item-button {
                transition: all 0.2s ease;
            }
            
            .item-button:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }
            
            .item-button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            
            .item-active {
                transform: scale(1.1);
                box-shadow: 0 0 10px 3px rgba(255, 255, 255, 0.7);
            }
            
            .challenge-indicator {
                background: linear-gradient(90deg, #9b59b6, #8e44ad);
            }
            /* 击退全局呼吸发光 */
            @keyframes defend-glow {
                0%  { box-shadow: 0 0 6px 2px rgba(241, 196, 15, 0.6); }
                50% { box-shadow: 0 0 18px 6px rgba(241, 196, 15, 0.9); }
                100%{ box-shadow: 0 0 6px 2px rgba(241, 196, 15, 0.6); }
            }
            .defend-glow-active {
                animation: defend-glow 0.6s ease-in-out 3;
            }
            /* 连击击退飘字 */
            .defend-text {
                position: fixed;
                top: 35%;
                left: 50%;
                transform: translateX(-50%);
                font-size: 40px;
                font-weight: bold;
                color: #f1c40f;
                text-shadow: 
                    -3px -3px 0 #9b59b6,
                    3px -3px 0 #9b59b6,
                    -3px 3px 0 #9b59b6,
                    3px 3px 0 #9b59b6;
                pointer-events: none;
                z-index: 99999;
                animation: defend-fly 1.4s ease-out forwards;
            }

            @keyframes defend-fly {
                 0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
                 50%{ transform: translate(-50%, -20px) scale(1.2); }
                100% { opacity: 0; transform: translate(-50%, -60px) scale(1.3); }
            }

            /* 缓冲层基础样式 */
            .buffer-layer {
              position: absolute;
              top: 0;
              left: 0;
              height: 100%;
              border-radius: 9999px;
              transition: all 0.3s ease;
            }
            /* 进度条容器强制隐藏溢出内容 */
            #challenge-progress-container {
              overflow: hidden !important;
            }

            /* 冰冻方块样式 */
            .tile-frozen {
                position: relative;
                overflow: hidden;
                cursor: not-allowed !important;
            }

            .tile-frozen::after {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, rgba(135, 206, 250, 0.65), rgba(173, 216, 230, 0.45));
                border-radius: 0.25rem;
                pointer-events: none;
                z-index: 1;
                box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.6);
            }

            .tile-frozen::before {
                content: '❄️';
                position: absolute;
                top: 2px;
                right: 2px;
                font-size: 12px;
                z-index: 2;
                pointer-events: none;
            }

            /* 破冰动画 */
            @keyframes ice-break {
                0% { transform: scale(1); opacity: 1; }
                25% { transform: scale(1.15); opacity: 0.9; }
                50% { transform: scale(0.95); opacity: 0.7; }
                75% { transform: scale(1.05); opacity: 0.85; }
                100% { transform: scale(1); opacity: 1; }
            }

            .tile-ice-breaking {
                animation: ice-break 0.4s ease-in-out;
            }
        }
    </style>
</head>
<body class="bg-bg-2049 min-h-screen flex flex-col items-center justify-center p-4 font-game text-text-dark">
        <div class="w-full max-w-md">
            <!-- 游戏标题和分数 -->
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <img src="icon.png" alt="2049" class="w-16 h-16">
                    <h1 class="text-[30px] font-bold leading-none">2049</h1>
                </div>
            <div class="flex gap-2">
                <div class="bg-board-2049 rounded-md px-4 py-2 text-center">
                    <div class="text-xs uppercase text-white/70 font-bold">分数</div>
                    <div id="score" class="text-2xl font-bold text-white">0</div>
                </div>
                <div class="bg-board-2049 rounded-md px-4 py-2 text-center">
                    <div class="text-xs uppercase text-white/70 font-bold">最高分</div>
                    <div id="best-score" class="text-2xl font-bold text-white">0</div>
                </div>
            </div>
        </div>
        
        <!-- 挑战进度条 -->
        <div class="mb-4">
            <div class="flex justify-between text-xs mb-1">
                <span class="font-bold text-challenge">随机挑战生成进度</span>
                <span id="challenge-count">0 / 30</span>
            </div>
            <div id="challenge-progress-container" class="w-full bg-board-2049/30 rounded-full h-2 relative">
                <div id="challenge-progress" class="challenge-indicator h-2 rounded-full transition-all duration-300" style="width: 0%; z-index: 0;"></div>
            </div>
        </div>
        
        <!-- 游戏说明和新游戏按钮 -->
        <div class="flex justify-between items-center mb-4">
            <p class="text-sm font-bold text-challenge" id="level-info">第1关：目标 129</p>
            <button id="new-game" class="bg-board-2049 hover:bg-board-2049/90 text-white font-bold py-2 px-4 rounded transition-colors">
                新游戏
            </button>
        </div>
        
        <!-- 道具栏 -->
        <div class="bg-board-2049/20 rounded-md p-3 mb-4">
            <div class="text-xs font-bold mb-2 text-center" id="item-hint">道具栏 (点击选择，再点击方块使用)</div>
            <div class="grid grid-cols-6 gap-2">
                <button id="item-shuffle" class="item-button bg-item-shuffle text-white rounded-md py-2 px-1 flex flex-col items-center" title="随机打乱所有方块">
                    <i class="fa fa-random text-lg"></i>
                    <span class="text-xs mt-1">洗牌 <span id="count-shuffle">0</span></span>
                </button>
                <button id="item-clear" class="item-button bg-item-clear text-white rounded-md py-2 px-1 flex flex-col items-center" title="消除所有相连的同色方块，生成平均值方块">
                    <i class="fa fa-eraser text-lg"></i>
                    <span class="text-xs mt-1">消除 <span id="count-clear">0</span></span>
                </button>
                <button id="item-scissors" class="item-button bg-item-scissors text-white rounded-md py-2 px-1 flex flex-col items-center" title="将一个方块数字减半">
                    <i class="fa fa-cut text-lg"></i>
                    <span class="text-xs mt-1">剪刀 <span id="count-scissors">0</span></span>
                </button>
                <button id="item-swap" class="item-button bg-item-swap text-white rounded-md py-2 px-1 flex flex-col items-center" title="交换棋盘上任意两个方块的位置">
                    <i class="fa fa-exchange text-lg"></i>
                    <span class="text-xs mt-1">交换 <span id="count-swap">0</span></span>
                </button>
                <button id="item-plus" class="item-button bg-item-plus text-white rounded-md py-2 px-1 flex flex-col items-center" title="将一个方块加1">
                    <i class="fa fa-plus text-lg"></i>
                    <span class="text-xs mt-1">加一 <span id="count-plus">0</span></span>
                </button>
                <button id="item-undo" class="item-button bg-item-undo text-white rounded-md py-2 px-1 flex flex-col items-center" title="撤回上一步操作">
                    <i class="fa fa-undo text-lg"></i>
                    <span class="text-xs mt-1">撤回 <span id="count-undo">0</span></span>
                </button>
            </div>
        </div>
        
        <!-- 游戏棋盘 -->
        <div id="game-board" class="relative bg-board-2049 rounded-md p-3 aspect-square">
            <!-- 背景格子 -->
            <div class="grid grid-cols-4 gap-3 h-full">
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
                <div class="bg-cell-2049 rounded"></div>
            </div>
            
            <!-- 数字方块容器 -->
            <div id="tile-container" class="absolute top-3 left-3 right-3 bottom-3">
                <!-- 方块会动态生成在这里 -->
            </div>
            
            <!-- 游戏结束/胜利覆盖层 -->
            <div id="game-overlay" class="absolute inset-0 rounded-md game-overlay flex flex-col items-center justify-center hidden">
                <h2 id="overlay-title" class="text-4xl font-bold mb-4"></h2>
                <button id="overlay-button" class="bg-board-2049 hover:bg-board-2049/90 text-white font-bold py-2 px-4 rounded transition-colors">
                    再来一局
                </button>
            </div>
        </div>
        
        <!-- 操作提示 -->
        <div class="mt-6 text-center text-sm">
            <p>使用 <strong>方向键</strong> 或 <strong>滑动屏幕</strong> 移动方块</p>
            <p class="mt-1 text-challenge font-bold">任意奇数均可合并，仅相同偶数可合并！</p>
            <p class="mt-1 text-green-600 font-bold">每次合成32及以上数字可获得1个道具！</p>
            <p class="mt-1 text-blue-600 font-bold">每移动一定次数会生成1个随机挑战数字！</p>
            <p class="mt-1 text-cyan-600 font-bold">❄️ 在冰冻方块周围合成相同数字即可破冰！</p>
            <p class="mt-1">只要有道具，棋盘满了也不会输！</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tileContainer = document.getElementById('tile-container');
            const scoreDisplay = document.getElementById('score');
            const bestScoreDisplay = document.getElementById('best-score');
            const newGameButton = document.getElementById('new-game');
            const gameOverlay = document.getElementById('game-overlay');
            const overlayTitle = document.getElementById('overlay-title');
            const overlayButton = document.getElementById('overlay-button');
            const challengeCount = document.getElementById('challenge-count');
            const challengeProgress = document.getElementById('challenge-progress');
            
            // 道具相关元素
            const itemButtons = {
                swap: document.getElementById('item-swap'),
                clear: document.getElementById('item-clear'),
                scissors: document.getElementById('item-scissors'),
                shuffle: document.getElementById('item-shuffle'),
                plus: document.getElementById('item-plus'),
                undo: document.getElementById('item-undo')
            };
            
            const itemCounts = {
                swap: document.getElementById('count-swap'),
                clear: document.getElementById('count-clear'),
                scissors: document.getElementById('count-scissors'),
                shuffle: document.getElementById('count-shuffle'),
                plus: document.getElementById('count-plus'),
                undo: document.getElementById('count-undo')
            };
            
            let grid = [];
            let frozenGrid = []; // 冰冻方块状态数组（与grid一一对应）
            let score = 0;
            let bestScore = parseInt(localStorage.getItem('2049-best-score') || '0');
            let gameOver = false;
            let gameWon = false;
            let currentLevel = 1;
            const levelTargets = { 1: 129, 2: 2049 };
            
            // 道具系统
            let items = {
                swap: 0,
                clear: 0,
                scissors: 0,
                shuffle: 0,
                plus: 0,
                undo: 0
            };
            
            let activeItem = null;
            let selectedTile = null;
            let nextTileId = 0;
            let tilePositions = {}; // 用于交换道具的第一个选中方块
            let history = []; // 用于撤回的历史记录
            
            // 道具使用提示
            const itemHints = {
                swap: '交换：选择2个方块交换位置',
                clear: '清除：点击至少3个相连的同色方块中的1块，合成为平均数',
                scissors: '剪刀：选择目标方块，使其数字减半',
                plus: '加一：选择目标方块，使其数字+1',
                default: '道具栏 (点击选择，再点击方块使用)'
            };
            
            // 统一清理所有方块的高亮和选中状态
            function clearAllHighlights() {
                const tiles = tileContainer.querySelectorAll('div');
                tiles.forEach(tile => {
                    tile.classList.remove('tile-highlight');
                    tile.classList.remove('tile-selected');
                });
            }
            
            // ============================
            // 关卡特殊规则（第一关：第4列/第4行为X不可操作）
            // ============================
            function isBlocked(row, col) {
                // 当前所有关卡均无X不可操作位置，统一返回false
                return false;
            }

            // 第一关预设布局（4×4）- 左下角添加冰冻32
            const level1Preset = [
                [0, 0, 0, 0],
                [0, 0, 0, 0],
                [7, 0, 9, 0],
                [32, 8, 8, 0]
            ];

            // ============================
            // 帮助系统（我来助你）
            // ============================
            let helpCounts = { merge: 1, destroy: 1, rearrange: 1 }; // 每局各1次
            let helpActive = false;
            let helpMode = null; // 'merge', 'destroy', 'rearrange'
            let helpSelectedTiles = [];

            const helpButton = document.getElementById('help-button');
            const helpOverlay = document.getElementById('help-overlay');
            const helpOptions = document.querySelectorAll('.help-option');
            const helpCancel = document.getElementById('help-cancel');

            // 更新帮助按钮和帮助选项显示
            function updateHelpUI() {
                const totalLeft = helpCounts.merge + helpCounts.destroy + helpCounts.rearrange;
                if (totalLeft <= 0) {
                    helpButton.disabled = true;
                    helpButton.title = '次数已耗尽';
                } else {
                    helpButton.disabled = false;
                    helpButton.title = '我来助你（剩余' + totalLeft + '次）';
                }

                // 更新每个选项的可用状态
                helpOptions.forEach(opt => {
                    const type = opt.dataset.type;
                    if (helpCounts[type] <= 0) {
                        opt.classList.add('help-option-disabled');
                        opt.style.pointerEvents = 'none';
                    } else {
                        opt.classList.remove('help-option-disabled');
                        opt.style.pointerEvents = '';
                    }

                    // 更新显示剩余次数
                    const countSpan = opt.querySelector('.help-option-count');
                    if (countSpan) {
                        countSpan.textContent = '（剩余' + helpCounts[type] + '次）';
                    }
                });
            }

            // 显示帮助效果选择弹窗
            function showHelpModal() {
                if (gameOver || gameWon) {
                    showToast('游戏已结束！');
                    return;
                }
                const totalLeft = helpCounts.merge + helpCounts.destroy + helpCounts.rearrange;
                if (totalLeft <= 0) {
                    showToast('次数已耗尽！');
                    return;
                }
                updateHelpUI();
                helpOverlay.classList.remove('hidden');
            }

            // 隐藏帮助效果选择弹窗
            function hideHelpModal() {
                helpOverlay.classList.add('hidden');
            }
            
            // 开始帮助效果
            function startHelpMode(mode) {
                if (!helpCounts[mode] || helpCounts[mode] <= 0) {
                    showToast('该效果本局已使用！');
                    return;
                }

                helpActive = true;
                helpMode = mode;
                helpSelectedTiles = [];
                helpCounts[mode]--;   // 消耗1次
                hideHelpModal();

                if (mode === 'merge') {
                    showToast('融合：请点击1个方块');
                } else if (mode === 'destroy') {
                    const totalTiles = countNonZeroTiles();
                    const needCount = Math.min(3, totalTiles);
                    showToast(`爆炸：请点击${needCount}个方块（共${totalTiles}块）`);
                } else if (mode === 'rearrange') {
                    executeRearrange();
                }

                if (mode !== 'rearrange') {
                    const tiles = tileContainer.querySelectorAll('div');
                    tiles.forEach(tile => {
                        // 只给非冰冻方块加高亮
                        if (tile.dataset.frozen !== 'true') {
                            tile.classList.add('tile-highlight');
                        }
                    });
                }

                updateHelpUI();
            }

            // 统计棋盘上非零方块数量（跳过X位置）
            function countNonZeroTiles() {
                let count = 0;
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(i, j) && grid[i][j] > 0) count++;
                    }
                }
                return count;
            }

            // 获取爆炸需要选择的方块数（不足3块时选全部）
            function getDestroyTargetCount() {
                const total = countNonZeroTiles();
                return Math.min(3, total);
            }
            
            // 执行融合效果
            function executeMerge(row, col) {
                // 无法选中冰冻方块
                if (frozenGrid[row][col]) {
                    showToast('无法选中冰冻方块！');
                    return;
                }
                
                const tileValue = grid[row][col];
                if (tileValue === 0) {
                    showToast('请选择一个有数字的方块！');
                    return;
                }
                
                // 只收集非冰冻方块的数值
                const values = [];
                for (let i = Math.max(0, row - 1); i <= Math.min(3, row + 1); i++) {
                    for (let j = Math.max(0, col - 1); j <= Math.min(3, col + 1); j++) {
                        if (grid[i][j] > 0 && !frozenGrid[i][j]) {
                            values.push(grid[i][j]);
                        }
                    }
                }
                
                if (values.length === 0) return;
                
                // 计算平均数
                const avg = Math.floor(values.reduce((a, b) => a + b, 0) / values.length);
                
                // 只清空非冰冻非X位置，冰冻方块保持不变
                for (let i = Math.max(0, row - 1); i <= Math.min(3, row + 1); i++) {
                    for (let j = Math.max(0, col - 1); j <= Math.min(3, col + 1); j++) {
                        if (i === row && j === col) {
                            // 点击位置：设为平均数，变为普通方块
                            grid[i][j] = avg;
                            frozenGrid[i][j] = false;
                        } else if (!isBlocked(i, j) && !frozenGrid[i][j]) {
                            // 非X非冰冻位置：清空
                            grid[i][j] = 0;
                            frozenGrid[i][j] = false;
                        }
                        // X位置和冰冻位置保持不变
                    }
                }
                
                // 更新显示
                helpActive = false;
                helpMode = null;
                updateHelpUI();
                pushHistory();
                renderTiles(grid);
                updateMaxTileValue();
                saveGameState();

                clearAllHighlights();

                showToast(`融合完成！方块已变为${avg}`);
                playItemSound('swap');
                
                // 检查胜利
                checkWin();
            }
            
            // 执行爆炸效果
            function executeDestroy(row, col) {
                // 无法选中冰冻方块
                if (frozenGrid[row][col]) {
                    showToast('无法选中冰冻方块！');
                    return;
                }
                
                // 防抖：如果帮助模式已结束（已被处理过），忽略重复调用
                if (!helpActive) return;

                // 检查是否已选中（重复点击则取消选择）
                const existIdx = helpSelectedTiles.findIndex(p => p.row === row && p.col === col);
                const tiles = tileContainer.querySelectorAll('div');

                if (existIdx !== -1) {
                    // 取消选择：移除高光，从列表中删除
                    helpSelectedTiles.splice(existIdx, 1);
                    tiles.forEach(tile => {
                        if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                            tile.classList.remove('tile-selected');
                            tile.classList.add('tile-highlight');
                        }
                    });
                    const target = getDestroyTargetCount();
                    showToast(`已取消选择，已选${helpSelectedTiles.length}/${target}`);
                    return;
                }

                // 新选择：添加高光
                helpSelectedTiles.push({ row, col });
                tiles.forEach(tile => {
                    if (parseInt(tile.dataset.row) === row && parseInt(tile.dataset.col) === col) {
                        tile.classList.add('tile-selected');
                        tile.classList.remove('tile-highlight');
                    }
                });

                const target = getDestroyTargetCount();

                if (helpSelectedTiles.length < target) {
                    showToast(`已选择${helpSelectedTiles.length}/${target}，继续点击`);
                    return;
                }

                // 选够数量，执行摧毁
                const destroyedCount = helpSelectedTiles.length;
                const totalBefore = countNonZeroTiles();
                helpSelectedTiles.forEach(pos => {
                    grid[pos.row][pos.col] = 0;
                    frozenGrid[pos.row][pos.col] = false;
                });

                // 更新显示
                helpActive = false;
                helpMode = null;
                helpSelectedTiles = [];
                updateHelpUI();
                pushHistory();
                renderTiles(grid);
                clearAllHighlights();
                
                // 如果清空了所有方块，自动生成1个新方块
                if (totalBefore === destroyedCount) {
                    addRandomTile();
                }

                updateMaxTileValue();
                saveGameState();

                showToast(`爆炸完成！已摧毁${destroyedCount}个方块`);
                playItemSound('clear');
                checkWin();
            }
            
            // 执行整队效果
            function executeRearrange() {
                // 只收集非冰冻方块的数值
                const values = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] > 0 && !frozenGrid[i][j]) {
                            values.push(grid[i][j]);
                        }
                    }
                }
                
                // 从小到大排序
                values.sort((a, b) => a - b);
                
                // S形排列，冰冻方块位置保持不变
                const newGrid = Array(4).fill().map(() => Array(4).fill(0));
                // 先复制冰冻方块的数值
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (frozenGrid[i][j]) {
                            newGrid[i][j] = grid[i][j];
                        }
                    }
                }
                
                let index = 0;
                for (let i = 0; i < 4; i++) {
                    if (i % 2 === 0) {
                        // 偶数行：左→右
                        for (let j = 0; j < 4; j++) {
                            if (!frozenGrid[i][j] && index < values.length) {
                                newGrid[i][j] = values[index++];
                            }
                        }
                    } else {
                        // 奇数行：右→左
                        for (let j = 3; j >= 0; j--) {
                            if (!frozenGrid[i][j] && index < values.length) {
                                newGrid[i][j] = values[index++];
                            }
                        }
                    }
                }
                
                // 更新grid，冰冻状态保持不变
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        grid[i][j] = newGrid[i][j];
                    }
                }
                
                // 更新显示
                helpActive = false;
                helpMode = null;
                updateHelpUI();
                pushHistory();
                renderTiles(grid);
                updateMaxTileValue();
                saveGameState();
                
                showToast('整队完成！非冰冻方块已按S形排列');
                playItemSound('shuffle');
                
                // 检查胜利
                checkWin();
            }
            
            // 帮助效果选择
            helpOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const type = option.getAttribute('data-type');
                    startHelpMode(type);
                });
            });
            
            // 帮助按钮点击
            helpButton.addEventListener('click', () => {
                showHelpModal();
            });
            
            // 取消按钮
            helpCancel.addEventListener('click', () => {
                hideHelpModal();
            });
            
            // ESC取消帮助
            document.addEventListener('keydown', (e) => {
                if (helpActive && e.key === 'Escape') {
                    helpActive = false;
                    helpMode = null;
                    helpSelectedTiles = [];
                    hideHelpModal();
                    showToast('取消特殊效果');

                    // 移除所有高光
                    const tiles = tileContainer.querySelectorAll('div');
                    tiles.forEach(tile => {
                        tile.classList.remove('tile-highlight');
                        tile.classList.remove('tile-selected');
                    });
                }
            });
            
           // 挑战系统
           let moveCount = 0;
           let refreshInterval = 25;
           let maxTileValue = 0;
           let challengeBuffer = 0; // 黄色缓冲（击退额度，实时消耗）
           // 连击专用：连续合成≥32计数
           let combo32Count = 0;  
           
            // 本次移动中合成的次数和数值
            let mergedValues = [];
            // 本次移动中所有合成发生的位置（合成后新方块的位置）
            let mergedPositions = [];
            
            // 挑战刷新随机数范围上限（仅2个相同2的n次幂合成时更新）
            let maxMergedPowerOf2 = 4;
            
            // ============================
            // 音效系统（Web Audio API）
            // ============================
            var audioCtx = null;
            var audioInited = false;

            function initAudio() {
                if (audioInited) return;
                try {
                    var AC = window['AudioContext'] || window['webkitAudioContext'];
                    audioCtx = new AC();
                    audioInited = true;
                } catch(e) { /* 浏览器不支持 */ }
            }

            // 合成值 → 频率映射
            function getMergeFreq(value) {
                if (value <= 3)   return 220;
                if (value <= 7)   return 277;
                if (value <= 15)  return 330;
                if (value <= 31)  return 392;
                if (value <= 63)  return 440;
                if (value <= 127) return 523;
                if (value <= 255) return 587;
                if (value <= 511) return 659;
                if (value <= 1023) return 784;
                if (value <= 2047) return 880;
                if (value === 2049) return 1200;
                return 990;
            }

            function playTone(freq, duration, type, volume) {
                if (!audioCtx) return;
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.type = type || 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume || 0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + duration);
            }

            function playMoveSound() {
                playTone(180, 0.08, 'sine', 0.15);
            }

            function playMergeSound(value) {
                var freq = getMergeFreq(value);
                playTone(freq, 0.25, 'triangle', 0.35);
                if (value >= 128) {
                    setTimeout(function() { playTone(freq * 1.5, 0.15, 'sine', 0.15); }, 60);
                }
            }

            function playItemSound(type) {
                var freqs = {
                    swap:    [330, 440],
                    clear:   [200, 250, 300],
                    scissors:[600, 400],
                    shuffle: [260, 320, 380, 440],
                    plus:    [400, 500, 600],
                    undo:    [500, 400]
                };
                var seq = freqs[type] || [440];
                seq.forEach(function(f, i) {
                    setTimeout(function() { playTone(f, 0.12, 'sine', 0.25); }, i * 70);
                });
            }

            function playWinSound() {
                if (!audioCtx) return;
                [262, 330, 392, 523].forEach(function(f, i) {
                    setTimeout(function() { playTone(f, 0.3, 'triangle', 0.4); }, i * 150);
                });
                setTimeout(function() { playTone(1047, 0.6, 'triangle', 0.5); }, 600);
            }

            function playChallengeSound() {
                if (!audioCtx) return;
                // 低 → 中 → 高 卡点上扬，干净有力
                playTone(196, 0.12, 'sine', 0.55);
                setTimeout(()=>playTone(247, 0.12, 'sine', 0.55), 100);
                setTimeout(()=>playTone(392, 0.22, 'sine', 0.6), 200);
            }

            // 击退炸裂专属音效
            function playDefendEpicSound() {
                if (!audioCtx) return;
                // 改节奏：长停顿 + 紧凑后两音，大气 噔——噔噔！
                playTone(520, 0.18, 'sine', 0.55);
                setTimeout(function() { 
                    playTone(660, 0.15, 'sine', 0.55); 
                }, 180);
                setTimeout(function() { 
                    playTone(880, 0.3, 'triangle', 0.7); 
                }, 260);
            }

            // 破冰专属音效
            function playIceBreakSound() {
                if (!audioCtx) return;
                // 清脆的玻璃破碎音效：高频 + 短促衰减
                playTone(1200, 0.1, 'sine', 0.4);
                setTimeout(() => playTone(1500, 0.08, 'sine', 0.3), 50);
                setTimeout(() => playTone(1800, 0.06, 'sine', 0.25), 100);
                setTimeout(() => playTone(2000, 0.05, 'sine', 0.2), 150);
            }

            // ============================

            // 判断是否为2的n次幂
            function isPowerOf2(n) {
                return n > 0 && (n & (n - 1)) === 0;
            }
            
            // 撤回奖励里程碑跟踪（每2000分+1次）
            let undoMilestoneCount = 0;
            
            // 初始化最高分
            bestScoreDisplay.textContent = bestScore;
            
            // ============================
            // localStorage 存/读 游戏状态
            // ============================
            const SAVE_KEY = '2049-game-state';

            function saveGameState() {
                const state = {
                    grid,
                    frozenGrid, // 保存冰冻方块状态
                    score,
                    items,
                    moveCount,
                    refreshInterval,
                    maxTileValue,
                    gameOver,
                    gameWon,
                    currentLevel,
                    helpCounts,
                    history,
                    undoMilestoneCount,
                    combo32Count,
                    challengeBuffer
                };
                localStorage.setItem(SAVE_KEY, JSON.stringify(state));
            }

            function loadGameState() {
                const raw = localStorage.getItem(SAVE_KEY);
                if (!raw) return false;
                try {
                    const state = JSON.parse(raw);
                    // 如果存档里游戏已结束，就不恢复
                    if (state.gameOver || state.gameWon) return false;
                    grid = state.grid;
                    // 兼容旧存档，没有frozenGrid则初始化为全false
                    frozenGrid = state.frozenGrid || Array(4).fill().map(() => Array(4).fill(false));
                    score = state.score;
                    items = state.items;
                    moveCount = state.moveCount;
                    refreshInterval = state.refreshInterval;
                    maxTileValue = state.maxTileValue;
                    gameOver = state.gameOver;
                    gameWon = state.gameWon;
                    currentLevel = state.currentLevel || 1;
                    helpCounts = state.helpCounts || { merge: 1, destroy: 1, rearrange: 1 };
                    history = state.history || [];
                    undoMilestoneCount = state.undoMilestoneCount || 0;
                    combo32Count = state.combo32Count || 0;
                    challengeBuffer = state.challengeBuffer || 0;
                    return true;
                } catch(e) {
                    return false;
                }
            }

            function clearGameState() {
                localStorage.removeItem(SAVE_KEY);
            }
            
            // 初始化游戏
            function initGame() {
                grid = Array(4).fill().map(() => Array(4).fill(0));
                frozenGrid = Array(4).fill().map(() => Array(4).fill(false));
                score = 0;
                gameOver = false;
                gameWon = false;
                
                // 每个道具初始各1个，撤回初始3个
                items = { swap: 1, clear: 1, scissors: 1, shuffle: 1, plus: 1, undo: 3 };
                activeItem = null;
                selectedTile = null;
                history = [];
                undoMilestoneCount = 0;
                
                // 重置帮助系统
                helpCounts = { merge: 1, destroy: 1, rearrange: 1 };
                helpActive = false;
                helpMode = null;
                helpSelectedTiles = [];
                updateHelpUI();
                
                // 重置挑战系统
                moveCount = 0;
                refreshInterval = 25;
                maxTileValue = 0;
                mergedValues = [];
                maxMergedPowerOf2 = 4;
                currentLevel = 1;
                combo32Count = 0;
                challengeBuffer = 0;

                updateScore();
                updateItemDisplay();
                updateChallengeDisplay();
                updateLevelDisplay();
                clearTiles();
                gameOverlay.classList.add('hidden');

                // 第一关使用预设布局（4×4，无X位置）
                if (currentLevel === 1) {
                    for (let i = 0; i < 4; i++) {
                        for (let j = 0; j < 4; j++) {
                            grid[i][j] = level1Preset[i][j];
                        }
                    }
                    // 设置左下角为冰冻方块
                    frozenGrid[3][0] = true;
                } else {
                    // 生成两个初始方块
                    addRandomTile();
                    addRandomTile();
                }
                
                // 更新最大数字
                updateMaxTileValue();

                // 渲染方块到页面
                renderTiles(grid);
                
                // 保存初始状态到历史
                pushHistory();

                // 持久化
                saveGameState();
            }
            
            // 清除所有方块
            function clearTiles() {
                tileContainer.innerHTML = '';
            }
            
            // 添加随机方块（跳过X位置）
            function addRandomTile() {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (grid[i][j] === 0 && !isBlocked(i, j)) {
                            emptyCells.push({ row: i, col: j });
                        }
                    }
                }
                
                if (emptyCells.length === 0) return;
                
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                
                grid[randomCell.row][randomCell.col] = value;
                addTile(randomCell.row, randomCell.col, value, true);
            }
            
            // 根据数值获取对应的颜色类（区间制）
            function getTileColorClass(value) {
                if (value <= 1) return 'tile-gray';
                if (value <= 3) return 'tile-2';
                if (value <= 7) return 'tile-4';
                if (value <= 15) return 'tile-8';
                if (value <= 31) return 'tile-16';
                if (value <= 63) return 'tile-32';
                if (value <= 127) return 'tile-64';
                if (value <= 255) return 'tile-128';
                if (value <= 511) return 'tile-256';
                if (value <= 1023) return 'tile-512';
                if (value <= 2047) return 'tile-1024';
                if (value <= 2048) return 'tile-2048';
                if (value === 2049) return 'tile-2049';
                return 'tile-super';
            }
            
            // 添加一个方块到DOM
            function addTile(row, col, value, isNew = false, isHighlighted = false, isChallenge = false, isSelected = false, isFrozen = false, isIceBreaking = false) {
                const tile = document.createElement('div');
                
                tile.style.position = 'absolute';
                tile.style.width = 'calc((100% - 36px) / 4)';
                tile.style.height = 'calc((100% - 36px) / 4)';
                tile.style.left = `calc(${col} * ((100% - 36px) / 4 + 12px))`;
                tile.style.top = `calc(${row} * ((100% - 36px) / 4 + 12px))`;
                tile.style.borderRadius = '0.25rem';
                tile.style.display = 'flex';
                tile.style.alignItems = 'center';
                tile.style.justifyContent = 'center';
                tile.style.fontWeight = 'bold';
                tile.style.fontSize = value >= 1000 ? '1.5rem' : value >= 100 ? '2rem' : '2.5rem';
                tile.style.zIndex = '10';
                tile.style.cursor = isFrozen ? 'not-allowed' : (activeItem ? 'pointer' : 'default');
                tile.style.transition = 'left 0.12s ease-in-out, top 0.12s ease-in-out';
                
                tile.textContent = value;
                tile.dataset.row = row;
                tile.dataset.col = col;
                tile.dataset.frozen = isFrozen;
                
                // 分配唯一ID
                const tileId = nextTileId++;
                tile.dataset.id = tileId;
                tilePositions[tileId] = {row: row, col: col};
                
                tile.classList.add(getTileColorClass(value));
                
                if (isNew) tile.classList.add('tile-appear');
                if (isHighlighted && !isFrozen) tile.classList.add('tile-highlight');
                if (isChallenge) tile.classList.add('tile-challenge');
                if (isSelected && !isFrozen) tile.classList.add('tile-selected');
                if (isFrozen) tile.classList.add('tile-frozen');
                if (isIceBreaking) tile.classList.add('tile-ice-breaking');
                
                // 冰冻方块不响应任何点击事件
                tile.addEventListener('click', () => {
                    if (isFrozen) return;
                    
                    // 帮助模式优先处理
                    if (helpActive && helpMode) {
                        if (helpMode === 'merge') {
                            executeMerge(row, col);
                        } else if (helpMode === 'destroy') {
                            executeDestroy(row, col);
                        }
                        return;
                    }
                    
                    // 道具系统
                    if (activeItem && grid[row][col] !== 0) {
                        useItemOnTile(row, col);
                    }
                });
                
                tileContainer.appendChild(tile);
                return tileId;
            }
            
            // 更新分数，并检查撤回奖励里程碑
            function updateScore() {
                scoreDisplay.textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    bestScoreDisplay.textContent = bestScore;
                    localStorage.setItem('2049-best-score', bestScore);
                }
                
                // 每2000分给一次撤回机会
                const milestones = Math.floor(score / 2000);
                if (milestones > undoMilestoneCount) {
                    const gained = milestones - undoMilestoneCount;
                    undoMilestoneCount = milestones;
                    items.undo += gained;
                    showToast(`🎉 每2000分奖励！获得${gained}次撤回机会！`);
                    updateItemDisplay();
                }
                
                // 更新刷新间隔
                refreshInterval = Math.max(10, 25 - Math.floor(score / 1000));
                updateChallengeDisplay();
            }
            
            // 更新挑战显示（分层缓冲条，五色循环，永不溢出）
            function updateChallengeDisplay() {
                challengeCount.textContent = `${moveCount} / ${refreshInterval}`;
                // 1. 更新紫色基础进度条（限制最大100%）
                challengeProgress.style.width = `${Math.min((moveCount / refreshInterval) * 100, 100)}%`;

                // 2. 分层缓冲条配置：黄、橙、红、蓝、绿 循环
                const bufferColors = ['bg-yellow-400', 'bg-orange-500', 'bg-red-500', 'bg-blue-500', 'bg-green-500'];
                const container = document.getElementById('challenge-progress-container');
                // 清空旧的缓冲层
                const oldLayers = container.querySelectorAll('.buffer-layer');
                oldLayers.forEach(layer => layer.remove());

                // 3. 计算缓冲层数与剩余值
                const totalBuffer = challengeBuffer;
                const layerMax = refreshInterval; // 一层的最大值 = 挑战阈值
                const fullLayers = Math.floor(totalBuffer / layerMax); // 满层数
                const remainBuffer = totalBuffer % layerMax; // 最后一层剩余值

                // 4. 生成所有满层（每层100%宽度，循环染色）
                for (let i = 0; i < fullLayers; i++) {
                    const color = bufferColors[i % bufferColors.length];
                    createBufferLayer(container, color, '100%', i + 1);
                }

                // 5. 生成最后一层（剩余宽度，接续染色）
                if (remainBuffer > 0) {
                    const color = bufferColors[fullLayers % bufferColors.length];
                    const width = `${(remainBuffer / layerMax) * 100}%`;
                    createBufferLayer(container, color, width, fullLayers + 1);
                }
            }

            // 工具函数：创建单个缓冲层
            function createBufferLayer(container, colorClass, width, zIndex) {
                const layer = document.createElement('div');
                layer.className = `${colorClass} h-2 rounded-full transition-all duration-300 absolute buffer-layer`;
                layer.style.width = width;
                layer.style.left = '0';
                layer.style.top = '0';
                layer.style.zIndex = zIndex; // 层叠顺序
                container.appendChild(layer);
            }

            // 显示击退飘字 + 全局呼吸灯发光 + 燃向音效
            function showDefendText() {
                // 1. 播放激动人心击退音效
                playDefendEpicSound();

                // 2. 飘字放大弹出
                const text = document.createElement('div');
                text.className = 'defend-text';
                text.textContent = 'COMBO！';
                document.body.appendChild(text);
                setTimeout(() => text.remove(), 1400);

                // 4. 进度条整体呼吸发光
                const progressWrap = document.getElementById('challenge-progress-container');
                progressWrap.classList.add('defend-glow-active');
                setTimeout(()=>progressWrap.classList.remove('defend-glow-active'), 1800);
            }
            
            // 更新关卡显示
            function updateLevelDisplay() {
                document.getElementById('level-info').textContent = `第${currentLevel}关：目标 ${levelTargets[currentLevel]}`;
            }
            
            // 更新道具显示
            function updateItemDisplay() {
                for (const [type, count] of Object.entries(items)) {
                    itemCounts[type].textContent = count;
                    itemButtons[type].disabled = count <= 0;
                    
                    if (activeItem === type) {
                        itemButtons[type].classList.add('item-active');
                    } else {
                        itemButtons[type].classList.remove('item-active');
                    }
                }
                
                const tiles = tileContainer.querySelectorAll('div');
                tiles.forEach(tile => {
                    tile.style.cursor = tile.dataset.frozen === 'true' ? 'not-allowed' : (activeItem ? 'pointer' : 'default');
                });
            }
            
            // 更新当前最大数字（跳过X位置）
            function updateMaxTileValue() {
                maxTileValue = 0;
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(i, j) && grid[i][j] > maxTileValue) {
                            maxTileValue = grid[i][j];
                        }
                    }
                }
            }
            
            // 检查胜利（根据当前关卡目标），返回是否刚获胜
            function checkWin() {
                if (gameWon) return false;
                var target = levelTargets[currentLevel];
                for (var i = 0; i < 4; i++) {
                    for (var j = 0; j < 4; j++) {
                        if (grid[i][j] === target) {
                            if (currentLevel === 1) {
                                // 第一关通关，重置盘面和道具，进入第二关
                                currentLevel = 2;
                                // 重置分数
                                score = 0;
                                // 重置盘面
                                grid = Array(4).fill().map(() => Array(4).fill(0));
                                frozenGrid = Array(4).fill().map(() => Array(4).fill(false));
                                // 重置道具
                                items = { swap: 1, clear: 1, scissors: 1, shuffle: 1, plus: 1, undo: 3 };
                                activeItem = null;
                                selectedTile = null;
                                // 重置挑战系统
                                moveCount = 0;
                                maxMergedPowerOf2 = 4;
                                mergedValues = [];
                                // 重置帮助系统
                                helpCounts = { merge: 1, destroy: 1, rearrange: 1 };
                                helpActive = false;
                                helpMode = null;
                                helpSelectedTiles = [];
                                // 重置历史和撤回里程碑
                                history = [];
                                undoMilestoneCount = 0;
                                // 重置连击和缓冲
                                combo32Count = 0;
                                challengeBuffer = 0;
                                // 清空方块显示
                                clearTiles();
                                // 生成两个新方块
                                addRandomTile();
                                addRandomTile();
                                // 更新显示
                                updateScore();
                                updateItemDisplay();
                                updateChallengeDisplay();
                                updateLevelDisplay();
                                updateHelpUI();
                                // 保存状态
                                saveGameState();
                                // 播放音效并显示提示
                                playWinSound();
                                showToast('🎉 第一关通关！进入第二关，目标：2049');
                                return true;
                            } else if (currentLevel === 2) {
                                // 第二关通关，游戏胜利
                                gameWon = true;
                                playWinSound();
                                setTimeout(function() { showOverlay('你赢了！'); }, 300);
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            // ============================
            // 撤回历史栈（独立于持久化历史）
            // ============================
            function pushHistory() {
                history.push({
                    grid: JSON.parse(JSON.stringify(grid)),
                    frozenGrid: JSON.parse(JSON.stringify(frozenGrid)),
                    score: score,
                    moveCount: moveCount,
                    maxTileValue: maxTileValue,
                    items: JSON.parse(JSON.stringify(items)),
                    currentLevel: currentLevel,
                    undoMilestoneCount: undoMilestoneCount,
                    challengeBuffer: challengeBuffer,
                    combo32Count: combo32Count
                });
                // 只保留最近20步
                if (history.length > 20) {
                    history.shift();
                }
            }

            // 执行撤回
            function doUndo() {
                if (items.undo <= 0) return;
                // history 最后一条是当前状态，倒数第二条是上一步
                if (history.length < 2) {
                    showToast('没有可撤回的步骤！');
                    return;
                }
                // 消耗1次撤回机会
                items.undo--;
                // 弹出当前状态
                history.pop();
                // 恢复上一步状态（不弹出，保持可继续撤回）
                const prev = history[history.length - 1];
                grid = JSON.parse(JSON.stringify(prev.grid));
                frozenGrid = JSON.parse(JSON.stringify(prev.frozenGrid));
                score = prev.score;
                moveCount = prev.moveCount;
                maxTileValue = prev.maxTileValue;
                currentLevel = prev.currentLevel || 1;
                // 恢复道具但不恢复undo数量（已经消耗了1次）
                const restoredItems = JSON.parse(JSON.stringify(prev.items));
                restoredItems.undo = items.undo;
                items = restoredItems;
                undoMilestoneCount = prev.undoMilestoneCount;
                challengeBuffer = prev.challengeBuffer || 0;
                combo32Count = prev.combo32Count || 0;

                gameOver = false;
                gameWon = false;

                scoreDisplay.textContent = score;
                updateItemDisplay();
                updateChallengeDisplay();
                updateLevelDisplay();
                renderTiles(prev.grid); // 传同一个grid，无合并动画
                gameOverlay.classList.add('hidden');

                saveGameState();
                showToast('✅ 已撤回上一步！');
            }
            
            // 检查玩家是否有可用道具
            function hasAnyItems() {
                for (const count of Object.values(items)) {
                    if (count > 0) return true;
                }
                return false;
            }
            
            // 检查两个数字是否可以合并
            function canMerge(a, b, aFrozen = false, bFrozen = false) {
                // 任意一个是冰冻方块，无法合并
                if (aFrozen || bFrozen) return false;
                if (a % 2 === 1 && b % 2 === 1) return true;
                if (a % 2 === 0 && b % 2 === 0 && a === b) return true;
                return false;
            }
            
            // ============================
            // 冰冻方块破冰机制（修正版：仅相邻合成可破冰）
            // ============================
            function checkAndBreakIce() {
                let iceBroken = false;
                const brokenPositions = [];
                
                // 遍历所有本次发生合成的位置
                for (const mergePos of mergedPositions) {
                    const mergeRow = mergePos.row;
                    const mergeCol = mergePos.col;
                    const mergeValue = grid[mergeRow][mergeCol];
                    
                    // 检查合成位置的上下左右四个方向是否有冰冻方块
                    const directions = [
                        [mergeRow-1, mergeCol], // 上
                        [mergeRow+1, mergeCol], // 下
                        [mergeRow, mergeCol-1], // 左
                        [mergeRow, mergeCol+1]  // 右
                    ];
                    
                    for (const [row, col] of directions) {
                        // 检查位置是否有效，是冰冻方块，且数值与合成值相同
                        if (row >= 0 && row < 4 && col >= 0 && col < 4 && 
                            frozenGrid[row][col] && 
                            grid[row][col] === mergeValue) {
                            // 破冰成功
                            frozenGrid[row][col] = false;
                            brokenPositions.push({ row: row, col: col, value: grid[row][col] });
                            iceBroken = true;
                        }
                    }
                }
                
                // 如果有破冰发生
                if (iceBroken) {
                    // 播放破冰音效
                    playIceBreakSound();
                    
                    // 显示破冰提示
                    if (brokenPositions.length === 1) {
                        showToast(`❄️ 破冰成功！冰冻 ${brokenPositions[0].value} 已解冻！`);
                    } else {
                        showToast(`❄️ 破冰成功！${brokenPositions.length} 个冰冻方块已解冻！`);
                    }
                    
                    // 重新渲染方块，添加破冰动画
                    renderTilesWithIceBreakAnimation(brokenPositions);
                }
                
                // 清空本次合成位置记录
                mergedPositions = [];
                
                return iceBroken;
            }
            
            // 带动画的破冰渲染
            function renderTilesWithIceBreakAnimation(brokenPositions) {
                // 记录旧位置的方块
                const oldTiles = new Map();
                tileContainer.querySelectorAll('div').forEach(tile => {
                    const row = parseInt(tile.dataset.row);
                    const col = parseInt(tile.dataset.col);
                    oldTiles.set(`${row}-${col}`, tile);
                });

                // 移动和更新现有方块
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const key = `${i}-${j}`;
                        if (grid[i][j] !== 0) {
                            // 检查是否是刚破冰的方块
                            const isBroken = brokenPositions.some(p => p.row === i && p.col === j);
                            
                            if (oldTiles.has(key)) {
                                // 方块位置不变，更新样式
                                const tile = oldTiles.get(key);
                                if (isBroken) {
                                    // 移除冰冻样式，添加破冰动画
                                    tile.classList.remove('tile-frozen');
                                    tile.classList.add('tile-ice-breaking');
                                    tile.dataset.frozen = 'false';
                                    tile.style.cursor = activeItem ? 'pointer' : 'default';
                                    
                                    // 动画结束后移除动画类
                                    setTimeout(() => {
                                        tile.classList.remove('tile-ice-breaking');
                                    }, 400);
                                }
                                oldTiles.delete(key);
                            } else {
                                // 新方块
                                addTile(i, j, grid[i][j], true, false, false, false, false, isBroken);
                            }
                        }
                    }
                }

                // 删除消失的方块
                oldTiles.forEach(tile => {
                    tile.classList.add('tile-destroying');
                    setTimeout(() => tile.remove(), 90);
                });
            }
            
            // 移动方块
            function move(direction) {
                if (gameOver || gameWon || activeItem || helpActive) return;
                
                let moved = false;
                const oldGrid = JSON.parse(JSON.stringify(grid));
                const oldScore = score;
                
                mergedValues = [];
                
                switch (direction) {
                    case 'up':    moved = moveUp();    break;
                    case 'down':  moved = moveDown();  break;
                    case 'left':  moved = moveLeft();  break;
                    case 'right': moved = moveRight(); break;
                }
                
                if (moved) {
                    playMoveSound();
                    // 播放所有合并音效
                    for (var mi = 0; mi < mergedValues.length; mi++) {
                        playMergeSound(mergedValues[mi]);
                    }
                    
                    // 检查并执行破冰
                    const iceBroken = checkAndBreakIce();
                                        
                    // ========== 全新击退结算逻辑：优先抵扣moveCount，剩余进黄色缓冲 ==========
                    const current32Merge = mergedValues.filter(v => v >= 32).length;

                    if (current32Merge > 0) {
                        // 连击计数递增
                        combo32Count++;
                        // 连击倍率：2^(n-1)
                        const addDefend = Math.pow(2, combo32Count - 1);

                        // 核心规则：优先抵扣紫色moveCount
                        let deduct = Math.min(addDefend, moveCount);
                        let remainDefend = addDefend - deduct;

                        // 抵扣进度
                        moveCount -= deduct;
                        // 剩余击退值存入黄色缓冲
                        challengeBuffer += remainDefend;

                        // 仅第二次及以上连击才飘击退文字
                        if (combo32Count >= 2) {
                            showDefendText();
                        }

                        // 友好提示
                        if(deduct > 0 && remainDefend > 0){
                            showToast(`🔥 连击${combo32Count}次！抵扣进度${deduct}，剩余${remainDefend}存入缓冲`);
                        }else if(deduct > 0){
                            showToast(`🔥 连击${combo32Count}次！直接抵扣进度${deduct}`);
                        }else{
                            showToast(`🔥 连击${combo32Count}次！全部${addDefend}存入击退缓冲`);
                        }
                    } else {
                        // 无32+合成，连击断档重置
                        combo32Count = 0;
                    }

                    // 原有每次移动消耗逻辑保留不变
                    if (challengeBuffer > 0) {
                        challengeBuffer--; 
                    } else {
                        moveCount++; 
                    }
                    // ======================================================================
                    
                    // 保存历史
                    pushHistory();
                    
                    updateMaxTileValue();
                    
                    let itemCount = 0;
                    for (const value of mergedValues) {
                        if (value >= 32) itemCount++;
                    }
                    
                    if (itemCount > 0) {
                        giveRandomItems(itemCount);
                        showToast(`合成成功！获得${itemCount}个道具！`);
                    }
                    
                    // 使用带动画的渲染
                    renderTilesWithAnimation(oldGrid);
                    
                    setTimeout(() => {
                        // 挑战触发时不生成普通2/4方块，仅生成挑战方块
                        if (moveCount >= refreshInterval) {
                            refreshRandomTileWithAnimation();
                            moveCount = 0;
                        } else {
                            addRandomTileWithAnimation();
                        }

                        if (!checkWin() && isGameOver()) {
                            gameOver = true;
                            showOverlay('游戏结束！');
                        }
                        
                        updateChallengeDisplay();
                        saveGameState();
                    }, 200); // 等待滑动和合并动画完成
                }
            }
            
            // 向左移动（保持X位置不变）
            function moveLeft() {
                let moved = false;
                
                for (let row = 0; row < 4; row++) {
                    // 收集非X位置的单元格（包含数值和冰冻状态）
                    let cells = [];
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(row, j) && grid[row][j] !== 0) {
                            cells.push({
                                value: grid[row][j],
                                frozen: frozenGrid[row][j]
                            });
                        }
                    }
                    
                    // 合并（冰冻方块不参与合并）
                    for (let i = 0; i < cells.length - 1; i++) {
                        if (canMerge(cells[i].value, cells[i+1].value, cells[i].frozen, cells[i+1].frozen)) {
                            const val = cells[i].value;
                            cells[i].value += cells[i + 1].value;
                            score += cells[i].value;
                            mergedValues.push(cells[i].value);
                            // 记录合成位置：向左合并后，新方块在第i个非X位置
                            let posIdx = 0;
                            for (let j = 0; j < 4; j++) {
                                if (!isBlocked(row, j)) {
                                    if (posIdx === i) {
                                        mergedPositions.push({row: row, col: j});
                                        break;
                                    }
                                    posIdx++;
                                }
                            }
                            if (isPowerOf2(val) && isPowerOf2(cells[i].value)) {
                                maxMergedPowerOf2 = Math.max(maxMergedPowerOf2, cells[i].value);
                            }
                            cells.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    
                    // 填回grid和frozenGrid（只填非X位置）
                    let idx = 0;
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(row, j)) {
                            const oldVal = grid[row][j];
                            const oldFrozen = frozenGrid[row][j];
                            if (idx < cells.length) {
                                grid[row][j] = cells[idx].value;
                                frozenGrid[row][j] = cells[idx].frozen;
                                idx++;
                            } else {
                                grid[row][j] = 0;
                                frozenGrid[row][j] = false;
                            }
                            if (oldVal !== grid[row][j] || oldFrozen !== frozenGrid[row][j]) moved = true;
                        }
                    }
                }
                
                updateScore();
                return moved;
            }
            
            // 向右移动（保持X位置不变）
            function moveRight() {
                let moved = false;
                
                for (let row = 0; row < 4; row++) {
                    // 收集非X位置的单元格（包含数值和冰冻状态）
                    let cells = [];
                    for (let j = 0; j < 4; j++) {
                        if (!isBlocked(row, j) && grid[row][j] !== 0) {
                            cells.push({
                                value: grid[row][j],
                                frozen: frozenGrid[row][j]
                            });
                        }
                    }
                    
                    // 合并（从右向左，冰冻方块不参与合并）
                    for (let i = cells.length - 1; i > 0; i--) {
                        if (canMerge(cells[i].value, cells[i-1].value, cells[i].frozen, cells[i-1].frozen)) {
                            const val = cells[i].value;
                            cells[i].value += cells[i - 1].value;
                            score += cells[i].value;
                            mergedValues.push(cells[i].value);
                            // 记录合成位置：向右合并后，新方块在第i个非X位置（从右数）
                            let posIdx = cells.length - 1;
                            for (let j = 3; j >= 0; j--) {
                                if (!isBlocked(row, j)) {
                                    if (posIdx === i) {
                                        mergedPositions.push({row: row, col: j});
                                        break;
                                    }
                                    posIdx--;
                                }
                            }
                            if (isPowerOf2(val) && isPowerOf2(cells[i].value)) {
                                maxMergedPowerOf2 = Math.max(maxMergedPowerOf2, cells[i].value);
                            }
                            cells.splice(i - 1, 1);
                            i--;
                            moved = true;
                        }
                    }
                    
                    // 填回grid和frozenGrid（从右向左，只填非X位置）
                    let idx = cells.length - 1;
                    for (let j = 3; j >= 0; j--) {
                        if (!isBlocked(row, j)) {
                            const oldVal = grid[row][j];
                            const oldFrozen = frozenGrid[row][j];
                            if (idx >= 0) {
                                grid[row][j] = cells[idx].value;
                                frozenGrid[row][j] = cells[idx].frozen;
                                idx--;
                            } else {
                                grid[row][j] = 0;
                                frozenGrid[row][j] = false;
                            }
                            if (oldVal !== grid[row][j] || oldFrozen !== frozenGrid[row][j]) moved = true;
                        }
                    }
                }
                
                updateScore();
                return moved;
            }
            
            // 向上移动（保持X位置不变）
            function moveUp() {
                let moved = false;
                
                for (let col = 0; col < 4; col++) {
                    // 收集非X位置的单元格（包含数值和冰冻状态）
                    let cells = [];
                    for (let i = 0; i < 4; i++) {
                        if (!isBlocked(i, col) && grid[i][col] !== 0) {
                            cells.push({
                                value: grid[i][col],
                                frozen: frozenGrid[i][col]
                            });
                        }
                    }
                    
                    // 合并（冰冻方块不参与合并）
                    for (let i = 0; i < cells.length - 1; i++) {
                        if (canMerge(cells[i].value, cells[i+1].value, cells[i].frozen, cells[i+1].frozen)) {
                            const val = cells[i].value;
                            cells[i].value += cells[i + 1].value;
                            score += cells[i].value;
